<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petri Lab</title>
<!-- xterm.js: full VT100 emulator for the Computer tab so rich's live
     multi-spinner, ANSI colors, and cursor control all render correctly. -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<!-- marked.js: evidence.md and other markdown content is rendered with
     this so cell detail pages display readable formatted text.
     DOMPurify sanitizes the parsed HTML before it's injected into the
     DOM, so a malicious URL/title in a citation can't smuggle script. -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<style>
/* ── Reset & Base ──────────────────────────────────────────────────── */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #050810;
  --bg-panel: #0c0f1a;
  --bg-card: #111526;
  --bg-header: #0a0d18;
  --border: #1a1d2e;
  --border-bright: #2a2d4a;
  --text: #e0e0e0;
  --text-dim: #666;
  --text-mid: #999;
  --green: #00ff88;
  --green-dim: #116644;
  --green-dark: #0a4a2a;
  --phosphor: #00ff88;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ── Screens ──────────────────────────────────────────────────────── */
.screen { display: none; position: absolute; inset: 0; overflow: hidden; }
.screen.active { display: flex; flex-direction: column; }

/* ── Mute Button (global, always visible) ─────────────────────────── */
#mute-btn {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 9999;
  background: rgba(10, 15, 24, 0.85);
  border: 1px solid var(--border-bright);
  color: var(--green);
  width: 40px;
  height: 40px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
}
#mute-btn:hover { border-color: var(--green); background: rgba(0,255,136,0.08); }
#mute-btn.muted { color: #555; }

/* ── Title Screen ─────────────────────────────────────────────────── */
#screen-title {
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  background: var(--bg);
}
.title-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.title-bg img {
  max-width: 80%;
  max-height: 70vh;
  object-fit: contain;
  filter: drop-shadow(0 0 40px rgba(0,255,136,0.15));
}
.title-enter {
  position: absolute;
  bottom: 12vh;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 6px;
  color: var(--green);
  text-shadow: 0 0 20px rgba(0,255,136,0.6), 0 0 40px rgba(0,255,136,0.3);
  animation: flash 1.2s ease-in-out infinite;
}
@keyframes flash {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* ── Computer / CRT Terminal (also hosts onboarding) ─────────────── */
#screen-computer { flex-direction: column; }
#screen-computer .crt-frame {
  flex: 1;
  margin: 14px auto 18px;
  width: min(1100px, 94vw);
  height: auto;
}
.crt-frame {
  position: relative;
  width: min(900px, 90vw);
  height: min(600px, 80vh);
  background: #000800;
  border-radius: 6px;
  border: 1px solid #00ccff;
  overflow: hidden;
}
.crt-screen {
  position: absolute;
  inset: 10px;
  background: #000800;
  border-radius: 4px;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 22px 26px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--green);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}
/* When the command input row is present the screen shrinks to leave room. */
.crt-frame.has-input .crt-screen { bottom: 52px; }
.crt-frame.has-input .crt-xterm  { bottom: 52px; }

/* xterm.js mount — fills the screen area when command mode is active.
   Positioned absolute inside .crt-frame just like .crt-screen so the
   scanlines overlay still floats on top. */
.crt-xterm {
  position: absolute;
  top: 10px; left: 10px; right: 10px; bottom: 10px;
  background: #000800;
  border-radius: 4px;
  padding: 8px 10px;
  z-index: 1;
  overflow: hidden;
}
.crt-xterm .xterm { height: 100%; }
.crt-xterm .xterm .xterm-viewport { background: transparent !important; }
.crt-xterm .xterm .xterm-screen { background: transparent !important; }
.crt-xterm .xterm-viewport::-webkit-scrollbar { width: 4px; }
.crt-xterm .xterm-viewport::-webkit-scrollbar-thumb { background: #00384a; }
.crt-screen::-webkit-scrollbar { width: 4px; }
.crt-screen::-webkit-scrollbar-track { background: transparent; }
.crt-screen::-webkit-scrollbar-thumb { background: #00384a; }
.crt-scanlines {
  position: absolute;
  inset: 10px;
  border-radius: 4px;
  pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px);
  z-index: 2;
}
.crt-input-row {
  position: absolute;
  left: 10px; right: 10px; bottom: 10px;
  height: 40px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  background: #001018;
  border: 1px solid #00ccff;
  clip-path: polygon(
    0 0, 100% 0,
    100% calc(100% - 6px), calc(100% - 6px) 100%,
    6px 100%, 0 calc(100% - 6px)
  );
  z-index: 4;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}
.crt-input-row .crt-prompt {
  color: #00ff88;
  font-weight: bold;
  font-size: 13px;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.crt-input-row .crt-cmd {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #e0f0ff;
  font-family: inherit;
  font-size: 13px;
  caret-color: #00ff88;
}
.crt-input-row .crt-cmd::placeholder { color: #5fa8b8; font-style: italic; }
.crt-input-row button {
  background: #001018;
  border: 1px solid #00ccff;
  color: #00ccff;
  font-family: inherit;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 1px;
  padding: 5px 12px;
  cursor: pointer;
  text-transform: uppercase;
  clip-path: polygon(
    6px 0, 100% 0, 100% calc(100% - 6px),
    calc(100% - 6px) 100%, 0 100%, 0 6px
  );
}
.crt-input-row button:hover:not(:disabled) { background: #002838; color: #ffcc00; }
.crt-input-row button.active { background: #00384a; color: #ffcc00; border-color: #ffcc00; }
.crt-input-row button.stop { border-color: #ff6b6b; color: #ff6b6b; }
.crt-input-row button.stop:hover:not(:disabled) { background: #3a1a1a; }
.crt-input-row button:disabled { opacity: 0.35; cursor: not-allowed; }
.term-line { margin-bottom: 2px; white-space: pre-wrap; word-break: break-word; }
.term-line.dim     { color: #116644; }
.term-line.bright  { color: #66ffbb; }
.term-line.error   { color: #ff4444; }
.term-line.cmd     { color: #ffcc00; margin-top: 6px; }
.term-line.stdout  { color: var(--green); }
.term-line.stderr  { color: #ff6b6b; }
.term-line.event   { color: #116644; opacity: 0.85; font-size: 12px; }
.term-line.system  { color: #33bb88; font-style: italic; }
.term-line.done    { color: #66ffbb; margin-bottom: 8px; }
.term-line.done.fail { color: #ff6b6b; }
.term-prompt { color: #33bb88; }
.term-cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: var(--green);
  animation: blink-cursor 0.8s step-end infinite;
  vertical-align: middle;
  margin-left: 2px;
}
@keyframes blink-cursor { 50% { opacity: 0; } }
.term-input-wrap { display: flex; align-items: center; margin-top: 4px; }
.term-input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--green);
  font-family: inherit;
  font-size: inherit;
  flex: 1;
  caret-color: var(--green);
}
.term-option {
  padding: 4px 12px;
  margin: 2px 0;
  cursor: pointer;
  border-radius: 3px;
  transition: background 0.1s;
}
.term-option:hover { background: rgba(0,255,136,0.1); }
.term-option.selected { background: rgba(0,255,136,0.15); color: #66ffbb; }
.term-option::before { content: '  '; }
.term-option.selected::before { content: '> '; color: var(--green); }

/* ── Header Bar (Lab + other views) ──────────────────────────────── */
.header-bar {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  background: var(--bg-header);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 16px;
  z-index: 10;
}
.header-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 2px;
  flex-shrink: 0;
  cursor: pointer;
  transition: color 0.15s;
}
.header-title:hover { color: #ffcc00; }
.header-nav { display: flex; gap: 2px; margin-left: 24px; }
.nav-tab {
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  background: transparent;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-family: inherit;
}
.nav-tab:first-child { border-radius: 4px 0 0 4px; }
.nav-tab:last-child { border-radius: 0 4px 4px 0; }
.nav-tab.active { background: var(--bg-card); color: var(--text); border-color: var(--border-bright); }
.nav-tab:hover:not(.active) { color: var(--text-mid); }
.header-spacer { flex: 1; }
.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: var(--green);
  letter-spacing: 2px;
  font-weight: 700;
  opacity: 0;
  transition: opacity 0.3s;
}
.live-badge.connected { opacity: 1; }
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: pulse-dot 1.5s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--green); }
  50% { opacity: 0.4; box-shadow: none; }
}

/* ── Shared HUD chrome primitives ─────────────────────────────────
 *
 * Single source of truth for the retro HUD look: reusable panels,
 * labels, values, corner brackets, and buttons that every screen
 * consumes. Any future tweak to the aesthetic lives here and ripples
 * across the whole dashboard — resist the urge to override colors or
 * corner shapes in per-screen rules.
 * --------------------------------------------------------------- */

.hud-screen {
  background: #000000;
  background-image:
    linear-gradient(to right,  #2a0d1f 1px, transparent 1px),
    linear-gradient(to bottom, #2a0d1f 1px, transparent 1px);
  background-size: 24px 24px;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

.hud-panel {
  position: relative;
  background: #001018;
  border: 1px solid #00ccff;
  clip-path: polygon(
    8px 0,
    calc(100% - 8px) 0, 100% 8px,
    100% calc(100% - 8px), calc(100% - 8px) 100%,
    8px 100%, 0 calc(100% - 8px),
    0 8px
  );
  padding: 12px 16px;
}
.hud-panel.top-bar {
  clip-path: polygon(
    8px 0, calc(100% - 8px) 0, 100% 8px,
    100% 100%, 0 100%, 0 8px
  );
}
.hud-panel.bottom-bar {
  clip-path: polygon(
    0 0, 100% 0,
    100% calc(100% - 8px), calc(100% - 8px) 100%,
    8px 100%, 0 calc(100% - 8px)
  );
}
.hud-panel.compact { padding: 8px 12px; }
.hud-panel.dense { padding: 6px 10px; }

.hud-row {
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
}

.hud-label {
  color: #5fa8b8;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.hud-value {
  color: #ffcc00;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 1px;
}
.hud-value.big { font-size: 24px; letter-spacing: 2px; }
.hud-value.success { color: #00ff88; }
.hud-value.danger  { color: #ff6b6b; }

.hud-title-text {
  color: #ffcc00;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: bold;
}

.hud-corners { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
.hud-corners::before,
.hud-corners::after,
.hud-corners .hud-corner-b,
.hud-corners .hud-corner-c {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
}
.hud-corners::before {
  top: 8px; left: 8px;
  border-top: 2px solid #ff3399;
  border-left: 2px solid #ff3399;
}
.hud-corners::after {
  top: 8px; right: 8px;
  border-top: 2px solid #ff3399;
  border-right: 2px solid #ff3399;
}
.hud-corners .hud-corner-b {
  bottom: 8px; left: 8px;
  border-bottom: 2px solid #ff3399;
  border-left: 2px solid #ff3399;
}
.hud-corners .hud-corner-c {
  bottom: 8px; right: 8px;
  border-bottom: 2px solid #ff3399;
  border-right: 2px solid #ff3399;
}

.hud-btn {
  background: #001018;
  color: #00ccff;
  border: 1px solid #00ccff;
  font-family: inherit;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 14px;
  cursor: pointer;
  clip-path: polygon(
    6px 0, 100% 0, 100% calc(100% - 6px),
    calc(100% - 6px) 100%, 0 100%, 0 6px
  );
}
.hud-btn:hover:not(:disabled) { background: #002838; color: #ffcc00; }
.hud-btn.danger { border-color: #ff6b6b; color: #ff6b6b; }
.hud-btn.danger:hover:not(:disabled) { background: #3a1a1a; }
.hud-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.hud-divider {
  height: 1px;
  background: #00384a;
  margin: 12px 0;
}

.hud-text       { color: #e0f0ff; font-size: 12px; line-height: 1.5; }
.hud-text.dim   { color: #5fa8b8; }
.hud-text.cmd   { color: #ffcc00; }
.hud-text.error { color: #ff6b6b; }
.hud-text.ok    { color: #00ff88; }
.hud-link       { color: #00ff88; cursor: pointer; text-decoration: none; }
.hud-link:hover { color: #ffcc00; text-decoration: underline; }

/* ── Lab Overview ────────────────────────────────────────────────── */
.lab-content {
  flex: 1;
  overflow-y: auto;
  padding: 28px 24px 40px;
  position: relative;
}
.lab-content::-webkit-scrollbar { width: 6px; }
.lab-content::-webkit-scrollbar-track { background: transparent; }
.lab-content::-webkit-scrollbar-thumb { background: #00384a; }

.lab-section-label {
  color: #5fa8b8;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin: 0 0 12px 2px;
}

.stats-ribbon {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}
.stats-ribbon .hud-panel { text-align: left; }
.stats-ribbon .hud-value.big { display: block; margin-top: 6px; }

.colony-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.colony-grid .hud-panel {
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.colony-grid .hud-panel:hover {
  border-color: #ffcc00;
  background: #002028;
}
.colony-grid .hud-panel:hover .colony-name-text { color: #ffcc00; }
.colony-name-text {
  color: #00ff88;
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: color 0.15s;
}
.colony-name-text .active-dot {
  width: 8px; height: 8px;
  background: #00ff88;
  animation: pulse-dot 1.5s ease-in-out infinite;
}
.colony-meta-row {
  font-size: 11px;
  color: #5fa8b8;
  margin-bottom: 12px;
  letter-spacing: 0.5px;
}
.colony-status-bar {
  display: flex;
  height: 10px;
  background: #000800;
  border: 1px solid #00384a;
  overflow: hidden;
}
.colony-status-seg { transition: width 0.3s; }

.queue-panel { margin-bottom: 20px; }
.queue-list { display: flex; flex-direction: column; gap: 8px; }
.queue-list .hud-panel.dense {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 12px;
}
.queue-cell-link {
  color: #00ff88;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 0.5px;
}
.queue-cell-link:hover { color: #ffcc00; text-decoration: underline; }
.queue-state {
  color: #ffcc00;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.queue-agent {
  color: #5fa8b8;
  font-size: 11px;
}

/* ── Colony DAG View — retro HUD map-screen chrome ──────────────── */
#screen-colony { background: #000000; }

.dag-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
  background: #000000;
  /* Faint magenta grid overlay, retro HUD style */
  background-image:
    linear-gradient(to right,  #2a0d1f 1px, transparent 1px),
    linear-gradient(to bottom, #2a0d1f 1px, transparent 1px);
  background-size: 24px 24px;
  image-rendering: pixelated;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}
.dag-container.grabbing { cursor: grabbing; }

.dag-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  shape-rendering: crispEdges;
}

/* Top HUD bar */
.dag-hud-top {
  position: absolute;
  top: 12px; left: 12px; right: 12px;
  height: 32px;
  background: #001018;
  border: 1px solid #00ccff;
  clip-path: polygon(
    8px 0,
    calc(100% - 8px) 0, 100% 8px,
    100% 100%,
    0 100%,
    0 8px
  );
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 14px;
  pointer-events: none;
  z-index: 10;
}
.dag-hud-top .hud-label {
  color: #5fa8b8;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.dag-hud-top .hud-value {
  color: #ffcc00;
  font-size: 11px;
  letter-spacing: 1px;
  font-weight: bold;
}
.dag-hud-top .hud-title {
  flex: 1;
  text-align: center;
  color: #ffcc00;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Bottom HUD bar — legend + BACK */
.dag-hud-bottom {
  position: absolute;
  bottom: 12px; left: 12px; right: 12px;
  min-height: 28px;
  background: #001018;
  border: 1px solid #00ccff;
  clip-path: polygon(
    0 0,
    100% 0,
    100% calc(100% - 8px), calc(100% - 8px) 100%,
    8px 100%, 0 calc(100% - 8px)
  );
  display: flex;
  align-items: center;
  padding: 4px 14px;
  gap: 14px;
  flex-wrap: wrap;
  z-index: 10;
}
.dag-hud-bottom .legend-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  letter-spacing: 1px;
  color: #5fa8b8;
  text-transform: uppercase;
}
.dag-hud-bottom .legend-swatch {
  width: 8px; height: 8px;
  border: 1px solid #00ccff;
  flex-shrink: 0;
}

/* Back button — cut-corner cyan chip below the top HUD */
.dag-back {
  position: absolute;
  top: 52px;
  left: 12px;
  background: #001018;
  color: #00ccff;
  border: 1px solid #00ccff;
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 5px 12px;
  cursor: pointer;
  z-index: 11;
  clip-path: polygon(
    6px 0, 100% 0, 100% 100%, 0 100%, 0 6px
  );
}
.dag-back:hover { background: #002838; color: #ffcc00; }

/* Corner brackets — four L-shaped magenta accents framing the map window */
.dag-corner {
  position: absolute;
  width: 14px;
  height: 14px;
  pointer-events: none;
  z-index: 5;
}
.dag-corner.tl { top: 50px;    left: 12px;  border-top: 2px solid #ff3399; border-left: 2px solid #ff3399; }
.dag-corner.tr { top: 50px;    right: 12px; border-top: 2px solid #ff3399; border-right: 2px solid #ff3399; }
.dag-corner.bl { bottom: 46px; left: 12px;  border-bottom: 2px solid #ff3399; border-left: 2px solid #ff3399; }
.dag-corner.br { bottom: 46px; right: 12px; border-bottom: 2px solid #ff3399; border-right: 2px solid #ff3399; }

/* Nodes & edges */
.dag-cell { cursor: pointer; transition: filter 0.15s; }
.dag-cell:hover { filter: brightness(1.4); }

.dag-edge { fill: none; stroke-linecap: butt; }
.dag-edge.intra { stroke: #00ff88; stroke-width: 2; }
.dag-edge.cross { stroke: #ff3399; stroke-width: 2; stroke-dasharray: 3 3; }

/* HTML body mounted inside each cell via <foreignObject> */
.cell-body {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  padding: 5px 8px 5px 8px;
  font-family: inherit;
  color: #e0f0ff;
  font-size: 10px;
  line-height: 1.25;
  overflow: hidden;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.cell-id {
  color: #00ccff;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}
.cell-claim {
  color: #e0f0ff;
  font-size: 11px;
  line-height: 1.35;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  word-break: break-word;
}
.dag-cell.is-seed .cell-id { color: #00ff88; }
.dag-cell.is-seed .cell-body { padding-left: 22px; }  /* leave room for the H glyph */
.dag-cell.is-ghost .cell-body { opacity: 0.65; }
.dag-cell.is-ghost .cell-claim { -webkit-line-clamp: 2; font-size: 10px; }
.dag-cell.is-ghost .cell-id { font-size: 9px; }

/* Tooltip — cut-corner cyan panel matching HUD chrome */
.dag-tooltip {
  display: none;
  position: fixed;
  background: #001018;
  border: 1px solid #00ccff;
  color: #5fa8b8;
  padding: 8px 12px;
  font-size: 10px;
  font-family: inherit;
  pointer-events: none;
  line-height: 1.5;
  max-width: 320px;
  z-index: 200;
  clip-path: polygon(
    6px 0, 100% 0, 100% calc(100% - 6px),
    calc(100% - 6px) 100%, 0 100%, 0 6px
  );
}
.dag-tooltip .tt-claim { color: #ffcc00; margin-bottom: 4px; letter-spacing: 0.5px; }
.dag-tooltip .tt-status {
  display: inline-block;
  padding: 1px 6px;
  font-size: 9px;
  color: #000;
  letter-spacing: 1px;
  text-transform: uppercase;
}

@keyframes pulse-glow { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
.cell-active { animation: pulse-glow 1.5s ease-in-out infinite; }

/* ── Research Logs ───────────────────────────────────────────────── */
.logs-toolbar {
  display: flex;
  gap: 12px;
  padding: 14px 22px 8px;
  flex-wrap: wrap;
  align-items: center;
  background: transparent;
}
.logs-filter {
  background: #001018;
  border: 1px solid #00ccff;
  color: #e0f0ff;
  font-family: inherit;
  font-size: 12px;
  padding: 7px 14px;
  outline: none;
  letter-spacing: 0.5px;
  clip-path: polygon(
    6px 0, 100% 0, 100% calc(100% - 6px),
    calc(100% - 6px) 100%, 0 100%, 0 6px
  );
}
.logs-filter::placeholder { color: #5fa8b8; font-style: italic; }
.logs-filter:focus { border-color: #ffcc00; }

.logs-feed {
  flex: 1;
  overflow-y: auto;
  padding: 6px 22px 20px;
  font-size: 12px;
  font-family: inherit;
  position: relative;
}
.logs-feed::-webkit-scrollbar { width: 6px; }
.logs-feed::-webkit-scrollbar-track { background: transparent; }
.logs-feed::-webkit-scrollbar-thumb { background: #00384a; }
.log-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 8px 14px;
  margin-bottom: 4px;
  background: rgba(0, 16, 24, 0.6);
  border-left: 2px solid #00ccff;
  transition: background 0.15s, border-color 0.15s;
}
.log-row:hover {
  background: #001830;
  border-left-color: #ffcc00;
}
.log-time {
  color: #ffcc00;
  flex-shrink: 0;
  width: 72px;
  font-weight: bold;
  letter-spacing: 0.5px;
}
.log-type-badge {
  padding: 3px 10px;
  font-size: 10px;
  font-weight: bold;
  flex-shrink: 0;
  min-width: 120px;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid currentColor;
}
.log-agent {
  color: #66ccff;
  flex-shrink: 0;
  min-width: 130px;
  font-weight: bold;
  letter-spacing: 0.5px;
}
.log-cell {
  color: #00ff88;
  cursor: pointer;
  font-weight: bold;
  flex-shrink: 0;
}
.log-cell:hover { color: #ffcc00; text-decoration: underline; }
.log-iter {
  color: #5fa8b8;
  flex-shrink: 0;
  font-size: 11px;
}
.logs-empty {
  color: #5fa8b8;
  text-align: center;
  padding: 64px 20px;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ── Cell Detail ─────────────────────────────────────────────────── */
.cell-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px 40px;
  position: relative;
  font-family: inherit;
}
.cell-content::-webkit-scrollbar { width: 6px; }
.cell-content::-webkit-scrollbar-track { background: transparent; }
.cell-content::-webkit-scrollbar-thumb { background: #00384a; }

.cell-back { margin-bottom: 20px; }

.cell-header {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.cell-claim-text {
  font-size: 20px;
  font-weight: bold;
  color: #e0f0ff;
  flex: 1;
  min-width: 260px;
  line-height: 1.4;
  letter-spacing: 0.5px;
}
.cell-status-badge {
  padding: 6px 14px;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  flex-shrink: 0;
  border: 1px solid currentColor;
  clip-path: polygon(
    6px 0, 100% 0, 100% calc(100% - 6px),
    calc(100% - 6px) 100%, 0 100%, 0 6px
  );
}

.cell-meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}
.meta-item-label {
  color: #5fa8b8;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.meta-item-value {
  color: #ffcc00;
  font-size: 13px;
  font-weight: bold;
  word-break: break-word;
  letter-spacing: 0.5px;
}
.meta-item-value.link { color: #00ff88; cursor: pointer; }
.meta-item-value.link:hover { color: #ffcc00; text-decoration: underline; }

.verdict-section { margin-bottom: 32px; }
.verdict-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  font-family: inherit;
}
.verdict-table th {
  text-align: left;
  padding: 10px 14px;
  color: #5fa8b8;
  border-bottom: 1px solid #00ccff;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: #001018;
}
.verdict-table td {
  padding: 10px 14px;
  border-bottom: 1px solid #003040;
  color: #e0f0ff;
}
.verdict-pass { color: #00ff88; font-weight: bold; }
.verdict-block { color: #ff6b6b; font-weight: bold; }

.timeline-section { margin-bottom: 32px; }
.timeline-group { margin-bottom: 24px; }
.timeline-iter-label {
  font-size: 11px;
  font-weight: bold;
  color: #ffcc00;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 0;
  border-bottom: 1px solid #00ccff;
  margin-bottom: 12px;
}
.timeline-event {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 10px 2px;
  border-bottom: 1px solid #001830;
  font-size: 12px;
}
.timeline-detail {
  flex: 1;
  color: #e0f0ff;
  line-height: 1.6;
}
.timeline-detail strong { color: #ffcc00; font-weight: bold; }
.timeline-time {
  color: #5fa8b8;
  flex-shrink: 0;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 0.5px;
}
.expand-toggle {
  cursor: pointer;
  color: #5fa8b8;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 0.5px;
}
.expand-toggle:hover { color: #ffcc00; }
.expand-content {
  display: none;
  margin-top: 10px;
  padding: 12px 14px;
  background: #000800;
  border: 1px solid #003040;
  font-size: 11px;
  white-space: pre-wrap;
  word-break: break-word;
  color: #66ffbb;
  line-height: 1.5;
}

/* ── Cell detail: Research Tag ───────────────────────────────────── */
.research-tag {
  display: inline-block;
  padding: 4px 14px;
  margin-bottom: 18px;
  background: #1a0a14;
  border: 1px solid #ff3399;
  color: #ff3399;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  clip-path: polygon(
    6px 0, 100% 0, 100% calc(100% - 6px),
    calc(100% - 6px) 100%, 0 100%, 0 6px
  );
}

/* ── Cell detail: Evidence markdown renderer ─────────────────────── */
.evidence-section { margin-bottom: 32px; }
.evidence-markdown {
  padding: 20px 24px;
  font-size: 13px;
  line-height: 1.7;
  color: #e0f0ff;
}
.evidence-markdown h1,
.evidence-markdown h2,
.evidence-markdown h3,
.evidence-markdown h4 {
  color: #ffcc00;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin: 18px 0 10px 0;
  padding-bottom: 4px;
  border-bottom: 1px solid #00384a;
}
.evidence-markdown h1 { font-size: 15px; color: #00ff88; }
.evidence-markdown h2 { font-size: 13px; }
.evidence-markdown h3 { font-size: 12px; color: #66ccff; }
.evidence-markdown h4 { font-size: 11px; color: #5fa8b8; border-bottom: none; }
.evidence-markdown p { margin: 8px 0; }
.evidence-markdown strong { color: #ffcc00; font-weight: bold; }
.evidence-markdown em { color: #66ffbb; font-style: italic; }
.evidence-markdown code {
  background: #001830;
  color: #66ffbb;
  padding: 1px 6px;
  font-size: 12px;
  border: 1px solid #003040;
}
.evidence-markdown pre {
  background: #000800;
  border: 1px solid #003040;
  padding: 10px 14px;
  overflow-x: auto;
  margin: 10px 0;
}
.evidence-markdown pre code {
  background: transparent;
  border: none;
  padding: 0;
  font-size: 11px;
  color: #66ffbb;
}
.evidence-markdown ul,
.evidence-markdown ol {
  margin: 8px 0 8px 20px;
  padding-left: 14px;
}
.evidence-markdown li { margin: 4px 0; }
.evidence-markdown blockquote {
  border-left: 3px solid #ff3399;
  padding: 4px 14px;
  margin: 10px 0;
  color: #66ccff;
  background: rgba(255, 51, 153, 0.05);
}
.evidence-markdown a {
  color: #00ff88;
  text-decoration: none;
  border-bottom: 1px dashed #00ff88;
}
.evidence-markdown a:hover { color: #ffcc00; border-bottom-color: #ffcc00; }
.evidence-markdown hr {
  border: none;
  border-top: 1px solid #00384a;
  margin: 16px 0;
}
.evidence-empty {
  color: #5fa8b8;
  font-size: 12px;
  font-style: italic;
  letter-spacing: 0.5px;
  padding: 12px 16px;
}

/* ── Cell detail: Citations list ─────────────────────────────────── */
.citations-section { margin-bottom: 32px; }
.citations-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.citation-card {
  position: relative;
}
.citation-card .citation-title {
  display: block;
  color: #00ff88;
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  text-decoration: none;
  word-break: break-word;
}
.citation-card .citation-title:hover { color: #ffcc00; text-decoration: underline; }
.citation-card .citation-url {
  display: block;
  color: #5fa8b8;
  font-size: 11px;
  margin-bottom: 8px;
  word-break: break-all;
}
.citation-card .citation-meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  font-size: 10px;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.citation-card .citation-direction {
  padding: 2px 8px;
  border: 1px solid currentColor;
  text-transform: uppercase;
  font-weight: bold;
}
.citation-card .citation-direction.supports { color: #00ff88; }
.citation-card .citation-direction.contradicts { color: #ff6b6b; }
.citation-card .citation-direction.neutral { color: #5fa8b8; }
.citation-card .citation-hierarchy { color: #66ccff; }
.citation-card .citation-agent { color: #5fa8b8; font-style: italic; }
.citation-card .citation-finding {
  color: #e0f0ff;
  font-size: 12px;
  line-height: 1.5;
}
.citations-empty {
  color: #5fa8b8;
  font-size: 12px;
  font-style: italic;
  letter-spacing: 0.5px;
  padding: 12px 16px;
}

/* ── Cell detail: Rendered event log rows (no raw JSON) ─────────── */
.cell-logs-section { margin-bottom: 32px; }
.cell-log-row {
  display: grid;
  grid-template-columns: 70px 160px 1fr;
  gap: 14px;
  padding: 9px 14px;
  margin-bottom: 4px;
  background: rgba(0, 16, 24, 0.6);
  border-left: 2px solid #00ccff;
  font-size: 12px;
  line-height: 1.5;
  align-items: start;
}
.cell-log-row:hover {
  background: #001830;
  border-left-color: #ffcc00;
}
.cell-log-row .cell-log-time {
  color: #ffcc00;
  font-weight: bold;
  letter-spacing: 0.5px;
}
.cell-log-row .cell-log-type {
  padding: 2px 8px;
  font-size: 10px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid currentColor;
  text-align: center;
  align-self: start;
}
.cell-log-row .cell-log-body {
  color: #e0f0ff;
  word-break: break-word;
}
.cell-log-row .cell-log-body strong { color: #ffcc00; font-weight: bold; }
.cell-log-row .cell-log-body a { color: #00ff88; text-decoration: none; border-bottom: 1px dashed #00ff88; }
.cell-log-row .cell-log-body a:hover { color: #ffcc00; border-bottom-color: #ffcc00; }
.cell-log-row .cell-log-agent {
  display: block;
  color: #66ccff;
  font-size: 11px;
  margin-top: 2px;
}
.cell-log-row .cell-log-verdict-pass { color: #00ff88; font-weight: bold; }
.cell-log-row .cell-log-verdict-fail { color: #ff6b6b; font-weight: bold; }
.cell-logs-empty {
  color: #5fa8b8;
  font-size: 12px;
  font-style: italic;
  padding: 12px 16px;
}

/* ── Loading / Empty States ──────────────────────────────────────── */
.loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); font-size: 14px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border-bright); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

    <div class="header-nav">
      <button class="nav-tab" data-view="lab">Lab</button>
