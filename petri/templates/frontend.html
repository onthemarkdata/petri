    </div>
    <div class="header-spacer"></div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
  <div class="hud-corners"><div class="hud-corner-b"></div><div class="hud-corner-c"></div></div>
  <div class="cell-content" id="cell-content">
    <div class="loading"><span class="spinner"></span>Loading cell...</div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   PETRI LAB — Single-file SPA
   All data comes from the backend API; no user-supplied content is
   rendered without escaping via textContent or createTextNode.
   ═══════════════════════════════════════════════════════════════════════ */

var API = '';

// ── Color Maps ──────────────────────────────────────────────────────────

var STATUS_COLORS = $status_colors_json;

var EVENT_COLORS = $event_colors_json;

var QUEUE_ACTIVE_STATES = $queue_active_states_json;

var PASS_VERDICTS = new Set($pass_verdicts_json);

// ── State ───────────────────────────────────────────────────────────────

var State = {
  cells: [],
  queue: [],
  stats: {},
  events: [],
  sseConnected: false,
  currentView: 'title',
  currentColony: null,
  currentCell: null,
};

// ── Utility ─────────────────────────────────────────────────────────────

function escapeHtml(str) {
  var el = document.createElement('span');
  el.textContent = str || '';
  return el.innerHTML;
}

function setText(parent, text) {
  parent.textContent = '';
  parent.appendChild(document.createTextNode(text || ''));
}

function buildEl(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(key) {
      if (key === 'className') el.className = attrs[key];
      else if (key === 'onclick') el.addEventListener('click', attrs[key]);
      else if (key === 'style' && typeof attrs[key] === 'object') {
        Object.keys(attrs[key]).forEach(function(prop) { el.style[prop] = attrs[key][prop]; });
      } else el.setAttribute(key, attrs[key]);
    });
  }
  if (typeof children === 'string') el.textContent = children;
  else if (Array.isArray(children)) children.forEach(function(child) { if (child) el.appendChild(child); });
  return el;
}

function buildSVGEl(tag, attrs) {
  var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  if (attrs) Object.keys(attrs).forEach(function(key) { el.setAttribute(key, attrs[key]); });
  return el;
}

// ── Audio Manager ───────────────────────────────────────────────────────

var bgm = document.getElementById('bgm');
var muteBtn = document.getElementById('mute-btn');
var audioStarted = false;
var muted = localStorage.getItem('petri-muted') === 'true';

function updateMuteUI() {
  bgm.muted = muted;
  muteBtn.textContent = muted ? 'M' : '\u266B';
  muteBtn.classList.toggle('muted', muted);
}
updateMuteUI();

muteBtn.addEventListener('click', function(evt) {
  evt.stopPropagation();
  muted = !muted;
  localStorage.setItem('petri-muted', String(muted));
  updateMuteUI();
  if (!audioStarted) startAudio();
});

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  bgm.volume = 0.4;
  bgm.play().catch(function() {});
  updateMuteUI();
}

// ── Router ──────────────────────────────────────────────────────────────

function navigate(view, param) {
  if (param) location.hash = view + '/' + encodeURIComponent(param);
  else location.hash = view;
}

function handleRoute() {
  var hash = location.hash.slice(1) || 'title';
  var parts = hash.split('/');
  var view = parts[0];
  var param = parts.slice(1).join('/');
  if (param) param = decodeURIComponent(param);

  State.currentView = view;

  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });

  switch (view) {
    case 'title':
      document.getElementById('screen-title').classList.add('active');
      break;
    case 'computer':
      document.getElementById('screen-computer').classList.add('active');
      updateNavTabs('computer');
      loadComputer();
      break;
    case 'lab':
      document.getElementById('screen-lab').classList.add('active');
      updateNavTabs('lab');
      loadLabData();
      break;
    case 'colony':
      document.getElementById('screen-colony').classList.add('active');
      updateNavTabs(null);
      State.currentColony = param;
      loadColonyDAG(param);
      break;
    case 'logs':
      document.getElementById('screen-logs').classList.add('active');
      updateNavTabs('logs');
      loadLogs();
      break;
    case 'cell':
      document.getElementById('screen-cell').classList.add('active');
      updateNavTabs(null);
      State.currentCell = param;
      loadCellDetail(param);
      break;
    default:
      document.getElementById('screen-title').classList.add('active');
  }
}

window.addEventListener('hashchange', handleRoute);

function updateNavTabs(activeView) {
  document.querySelectorAll('.nav-tab').forEach(function(tab) {
    tab.classList.toggle('active', tab.dataset.view === activeView);
  });
}

document.querySelectorAll('.nav-tab').forEach(function(tab) {
  tab.addEventListener('click', function() { navigate(tab.dataset.view); });
});

document.getElementById('dag-back-btn').addEventListener('click', function() { navigate('lab'); });

// ── Title Screen ────────────────────────────────────────────────────────

function handleTitleActivation() {
  startAudio();
  // Every entry to the title screen is a fresh start. The Computer tab
  // is the first stop — its own loadComputer() decides whether to run
  // the onboarding wizard (if no .petri) or drop into command mode.
  navigate('computer');
}

document.getElementById('screen-title').addEventListener('click', handleTitleActivation);
document.addEventListener('keydown', function(evt) {
  if (State.currentView !== 'title') return;
  if (evt.key === 'Enter' || evt.key === ' ') {
    evt.preventDefault();
    handleTitleActivation();
  }
});

// ── SSE Manager ─────────────────────────────────────────────────────────

var eventSource = null;

function connectSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource(API + '/api/stream');

  eventSource.addEventListener('connected', function() {
    State.sseConnected = true;
    document.querySelectorAll('.live-badge').forEach(function(b) { b.classList.add('connected'); });
  });

  eventSource.addEventListener('event_inserted', function(evt) {
    var data = JSON.parse(evt.data);
    State.events.unshift(data);
    if (State.events.length > 500) State.events.length = 500;
    if (State.currentView === 'logs') appendLogRow(data);
    if (State.currentView === 'lab') loadLabData();
    if (State.currentView === 'colony' && State.currentColony) loadColonyDAG(State.currentColony);
    if (State.currentView === 'cell' && State.currentCell === data.cell_id) loadCellDetail(State.currentCell);
    // Interleave live events as dim lines in the Computer terminal when
    // it's idle — same vibe as a background `tail -f` next to your shell.
    if (State.currentView === 'computer' && TerminalState.mode === 'idle') {
      var line = '[' + (data.type || '?') + '] ' + (data.cell_id || '') + ' · ' + (data.agent || '');
      if (XTERM) {
        XTERM.writeln(ANSI.grey + ANSI.dim + line + ANSI.reset);
      } else {
        termAppend('event', line);
      }
    }
  });

  eventSource.onerror = function() {
    State.sseConnected = false;
    document.querySelectorAll('.live-badge').forEach(function(b) { b.classList.remove('connected'); });
    setTimeout(connectSSE, 5000);
  };
}

// ── API Helpers ──────────────────────────────────────────────────────────

function fetchJSON(url) {
  return fetch(API + url).then(function(res) {
    if (!res.ok) throw new Error(String(res.status));
    return res.json();
  });
}

// ── Lab Overview ────────────────────────────────────────────────────────

function loadLabData() {
  Promise.all([
    fetchJSON('/api/cells'),
    fetchJSON('/api/queue'),
    fetchJSON('/api/stats'),
  ]).then(function(results) {
    State.cells = results[0];
    State.queue = results[1];
    State.stats = results[2];
    renderLab();
  }).catch(function(err) {
    var container = document.getElementById('lab-content');
    container.textContent = '';
    container.appendChild(buildEl('div', { className: 'loading' }, 'Failed to load: ' + err.message));
  });
}

function renderLab() {
  var container = document.getElementById('lab-content');
  container.textContent = '';

  var stats = State.stats;
  var cells = State.cells;
  var queue = State.queue;

  // Group cells by colony
  var colonies = {};
  cells.forEach(function(cell) {
    var cid = cell.colony_id || 'unknown';
    if (!colonies[cid]) colonies[cid] = [];
    colonies[cid].push(cell);
  });

  var queueEntries = Array.isArray(queue) ? queue : Object.values(queue.entries || queue);
  var activeQueue = queueEntries.filter(function(entry) {
    return QUEUE_ACTIVE_STATES.indexOf(entry.queue_state) !== -1;
  });

  // Stats ribbon — each stat is a cut-corner cyan HUD panel with a
  // big yellow value and a dim cyan label underneath.
  var ribbon = buildEl('div', { className: 'stats-ribbon' });
  [
    [stats.total_events || 0, 'Events'],
    [cells.length, 'Cells'],
    [stats.queue_size || 0, 'In Queue'],
    [activeQueue.length, 'Active'],
  ].forEach(function(pair) {
    var card = buildEl('div', { className: 'hud-panel compact' });
    card.appendChild(buildEl('div', { className: 'hud-label' }, pair[1]));
    card.appendChild(buildEl('div', { className: 'hud-value big' }, String(pair[0])));
    ribbon.appendChild(card);
  });
  container.appendChild(ribbon);

  // Colony cards — each colony is a clickable HUD panel.
  var colonyKeys = Object.keys(colonies);
  if (colonyKeys.length > 0) {
    container.appendChild(buildEl('div', { className: 'lab-section-label' }, 'Colonies'));
    var grid = buildEl('div', { className: 'colony-grid' });

    colonyKeys.forEach(function(colonyId) {
      var colonyCells = colonies[colonyId];
      var hasActive = colonyCells.some(function(cell) {
        return queueEntries.some(function(entry) {
          return entry.cell_id === cell.cell_id && QUEUE_ACTIVE_STATES.indexOf(entry.queue_state) !== -1;
        });
      });

      var statusCounts = {};
      colonyCells.forEach(function(cell) {
        statusCounts[cell.status] = (statusCounts[cell.status] || 0) + 1;
      });

      var displayName = colonyId.split('-').slice(1).join('-') || colonyId;

      var card = buildEl('div', { className: 'hud-panel', onclick: function() { navigate('colony', colonyId); } });

      var nameEl = buildEl('div', { className: 'colony-name-text' });
      if (hasActive) nameEl.appendChild(buildEl('span', { className: 'active-dot' }));
      nameEl.appendChild(document.createTextNode(displayName));
      card.appendChild(nameEl);

      card.appendChild(buildEl('div', { className: 'colony-meta-row' }, colonyCells.length + ' cells'));

      var bar = buildEl('div', { className: 'colony-status-bar' });
      var total = colonyCells.length;
      Object.keys(statusCounts).forEach(function(status) {
        var pct = (statusCounts[status] / total * 100).toFixed(1);
        var color = STATUS_COLORS[status] || '#555';
        bar.appendChild(buildEl('div', { className: 'colony-status-seg', title: status + ': ' + statusCounts[status], style: { width: pct + '%', background: color } }));
      });
      card.appendChild(bar);
      grid.appendChild(card);
    });

    container.appendChild(grid);
  } else {
    container.appendChild(buildEl('div', { className: 'logs-empty' }, 'No colonies yet. Run petri seed to create one.'));
  }

  // Active queue — dense HUD panels, yellow state badges.
  if (activeQueue.length > 0) {
    container.appendChild(buildEl('div', { className: 'lab-section-label' }, 'Active Processing'));
    var panel = buildEl('div', { className: 'queue-list' });
    activeQueue.forEach(function(entry) {
      var row = buildEl('div', { className: 'hud-panel dense' });
      var cellLink = buildEl('span', { className: 'queue-cell-link', onclick: function() { navigate('cell', entry.cell_id); } }, entry.cell_id);
      row.appendChild(cellLink);
      row.appendChild(buildEl('span', { className: 'queue-state' }, entry.queue_state));
      if (entry.iteration) row.appendChild(buildEl('span', { className: 'queue-agent' }, 'iter ' + entry.iteration));
      panel.appendChild(row);
    });
    container.appendChild(panel);
  }
}

// ── Colony DAG View ─────────────────────────────────────────────────────

function loadColonyDAG(colonyId) {
  Promise.all([fetchJSON('/api/cells'), fetchJSON('/api/queue')]).then(function(results) {
    var allCells = results[0];
    var queue = results[1];
    var colonyCells = allCells.filter(function(cell) { return cell.colony_id === colonyId; });
    if (colonyCells.length === 0) {
      setText(document.getElementById('dag-title'), 'NOT FOUND');
      return;
    }

    var queueEntries = Array.isArray(queue) ? queue : Object.values(queue.entries || queue);
    var activeSet = {};
    queueEntries.forEach(function(entry) {
      if (QUEUE_ACTIVE_STATES.indexOf(entry.queue_state) !== -1) {
        activeSet[entry.cell_id] = entry.queue_state;
      }
    });

    var displayName = (colonyId.split('-').slice(1).join('-') || colonyId).toUpperCase();
    var maxLevel = 0;
    colonyCells.forEach(function(cell) { if (cell.level > maxLevel) maxLevel = cell.level; });
    var activeCount = colonyCells.filter(function(cell) { return activeSet[cell.cell_id]; }).length;

    var padLeft = function(num, width) {
      var str = String(num);
      while (str.length < width) str = '0' + str;
      return str;
    };

    setText(document.getElementById('dag-title'), displayName);
    setText(document.getElementById('dag-stat-cells'),  padLeft(colonyCells.length, 3));
    setText(document.getElementById('dag-stat-active'), padLeft(activeCount, 2));
    setText(document.getElementById('dag-stat-levels'), padLeft(maxLevel + 1, 2));

    renderDAG(colonyCells, allCells, colonyId, activeSet);
    renderDAGLegend();
  });
}

function renderDAG(colonyCells, allCells, colonyId, activeSet) {
  var svg = document.getElementById('dag-svg');
  var container = document.getElementById('dag-container');
  var width = container.clientWidth;
  var height = container.clientHeight;
  var centerX = width / 2;
  var centerY = height / 2;

  var maxLevel = 0;
  colonyCells.forEach(function(cell) { if (cell.level > maxLevel) maxLevel = cell.level; });

  // Fixed cell dimensions — large enough to show ID + a few wrapped lines
  // of claim context. Seed hub is bigger, cross-colony ghost stubs smaller.
  var CELL_W = 200;
  var CELL_H = 68;
  var HUB_W  = 230;
  var HUB_H  = 82;
  var GHOST_W = 140;
  var GHOST_H = 48;

  // Ring spacing needs to fit a CELL_W-wide cell on every ring without
  // siblings overlapping. 240 is empirically comfortable for 6+ siblings.
  var ringSpacing = Math.max(240, Math.min(width, height) * 0.22);

  // Group cells by level so siblings can be distributed around each ring.
  var byLevel = {};
  colonyCells.forEach(function(cell) {
    (byLevel[cell.level] = byLevel[cell.level] || []).push(cell);
  });

  var simCells = [];
  var simMap = {};
  Object.keys(byLevel).forEach(function(levelKey) {
    var level = parseInt(levelKey, 10);
    var siblings = byLevel[levelKey];
    var ringRadius = level === 0 ? 0 : level * ringSpacing;
    siblings.forEach(function(cell, idx) {
      var angle = (idx / siblings.length) * Math.PI * 2 + level * 0.35;
      var edgeCount = (cell.dependencies || []).length + (cell.dependents || []).length;
      var isCenter = (level === 0);
      var sim = {
        id: cell.cell_id,
        data: cell,
        x: centerX + Math.cos(angle) * ringRadius,
        y: centerY + Math.sin(angle) * ringRadius,
        vx: 0, vy: 0,
        level: level,
        ringRadius: ringRadius,
        edgeCount: edgeCount,
        width:  isCenter ? HUB_W : CELL_W,
        height: isCenter ? HUB_H : CELL_H,
        // Border thickness scales with edge count (gravity/importance)
        borderWidth: Math.max(1, Math.min(5, 1 + Math.floor(edgeCount / 2))),
        isCenter: isCenter,
        isGhost: false,
      };
      simCells.push(sim);
      simMap[sim.id] = sim;
    });
  });

  // Build edges. Cross-colony dependencies get a dimmed ghost stub on the
  // outer rim so the user can see them reach into neighboring colonies.
  var allCellMap = {};
  (allCells || []).forEach(function(cell) { allCellMap[cell.cell_id] = cell; });

  var simEdges = [];
  var crossStubs = {};
  colonyCells.forEach(function(cell) {
    (cell.dependencies || []).forEach(function(depId) {
      var dep = allCellMap[depId];
      if (!dep) return;
      if (dep.colony_id === colonyId) {
        simEdges.push({ source: cell.cell_id, target: depId, kind: 'intra' });
        return;
      }
      if (!crossStubs[depId]) {
        var srcSim = simMap[cell.cell_id];
        var outerR = (maxLevel + 1.5) * ringSpacing;
        var ang = Math.atan2(srcSim.y - centerY, srcSim.x - centerX);
        var stub = {
          id: depId,
          data: dep,
          x: centerX + Math.cos(ang) * outerR,
          y: centerY + Math.sin(ang) * outerR,
          vx: 0, vy: 0,
          level: -1,
          ringRadius: outerR,
          edgeCount: 0,
          width:  GHOST_W,
          height: GHOST_H,
          borderWidth: 1,
          isCenter: false,
          isGhost: true,
        };
        crossStubs[depId] = stub;
        simCells.push(stub);
        simMap[depId] = stub;
      }
      simEdges.push({ source: cell.cell_id, target: depId, kind: 'cross' });
    });
  });

  // Light relaxation: radial pull toward target ring + rectangular AABB
  // minimum-translation repulsion. Seed stays pinned, ghost stubs stay
  // pinned on the outer rim.
  var TICKS = 60;
  for (var tick = 0; tick < TICKS; tick++) {
    var alpha = 1 - tick / TICKS;

    simCells.forEach(function(simCell) {
      if (simCell.isCenter) { simCell.x = centerX; simCell.y = centerY; simCell.vx = 0; simCell.vy = 0; return; }
      if (simCell.isGhost) return;
      var dxc = simCell.x - centerX;
      var dyc = simCell.y - centerY;
      var curR = Math.sqrt(dxc * dxc + dyc * dyc) || 1;
      var pull = (simCell.ringRadius - curR) * 0.08 * alpha;
      simCell.vx += (dxc / curR) * pull;
      simCell.vy += (dyc / curR) * pull;
    });

    for (var i = 0; i < simCells.length; i++) {
      for (var j = i + 1; j < simCells.length; j++) {
        var a = simCells[i];
        var b = simCells[j];
        var dx = b.x - a.x;
        var dy = b.y - a.y;
        // Rectangular overlap with ~20 px x / 16 px y padding.
        var xOverlap = (a.width  + b.width)  / 2 + 20 - Math.abs(dx);
        var yOverlap = (a.height + b.height) / 2 + 16 - Math.abs(dy);
        if (xOverlap > 0 && yOverlap > 0) {
          // Separate along the axis with the smaller overlap (MTV).
          if (xOverlap < yOverlap) {
            var pushX = (dx < 0 ? -1 : 1) * xOverlap * 0.5 * alpha;
            if (!a.isCenter && !a.isGhost) a.vx -= pushX;
            if (!b.isCenter && !b.isGhost) b.vx += pushX;
          } else {
            var pushY = (dy < 0 ? -1 : 1) * yOverlap * 0.5 * alpha;
            if (!a.isCenter && !a.isGhost) a.vy -= pushY;
            if (!b.isCenter && !b.isGhost) b.vy += pushY;
          }
        }
      }
    }

    simCells.forEach(function(simCell) {
      if (simCell.isCenter || simCell.isGhost) return;
      simCell.vx *= 0.80;
      simCell.vy *= 0.80;
      simCell.x += simCell.vx;
      simCell.y += simCell.vy;
    });
  }

  // Given a rectangle centered at (rect.x, rect.y) with rect.width /
  // rect.height, return the point on its border that lies along the
  // ray toward (towardsX, towardsY). Handles the degenerate cases
  // (dx == 0 or dy == 0) explicitly. Used by straightPath to trim a
  // center-to-center line so it touches the rectangle borders
  // without crossing into them.
  function rectBorderPoint(rect, towardsX, towardsY) {
    var dx = towardsX - rect.x;
    var dy = towardsY - rect.y;
    if (dx === 0 && dy === 0) {
      return { x: rect.x, y: rect.y };
    }
    var halfWidth = rect.width / 2;
    var halfHeight = rect.height / 2;
    var scale;
    if (dx === 0) {
      scale = halfHeight / Math.abs(dy);
    } else if (dy === 0) {
      scale = halfWidth / Math.abs(dx);
    } else {
      scale = Math.min(halfWidth / Math.abs(dx), halfHeight / Math.abs(dy));
    }
    return {
      x: rect.x + dx * scale,
      y: rect.y + dy * scale,
    };
  }

  // Straight line from the source cell's border to the target cell's
  // border. The line goes directly from src-center to tgt-center, but
  // trimmed at each rectangle's border so the stroke doesn't cross
  // into the cell interiors. Replaces the old two-segment elbow path
  // — straight edges read cleaner on dense colony graphs.
  function straightPath(src, tgt) {
    var srcBorder = rectBorderPoint(src, tgt.x, tgt.y);
    var tgtBorder = rectBorderPoint(tgt, src.x, src.y);
    return 'M' + Math.round(srcBorder.x) + ',' + Math.round(srcBorder.y) +
           ' L' + Math.round(tgtBorder.x) + ',' + Math.round(tgtBorder.y);
  }

  // Build a compact ID label: "<colony-slug> · L<level>.<seq>".
  function cellIdLabel(simCell) {
    var fullId = simCell.id || '';
    var colonyId = simCell.data.colony_id || '';
    var suffix = fullId;
    if (colonyId && fullId.indexOf(colonyId) === 0) {
      suffix = fullId.slice(colonyId.length + 1); // drop the leading "-"
    }
    var parts = suffix.split('-');
    var levelSeq = parts.length >= 2
      ? 'L' + parts[0] + '.' + parts[1]
      : (suffix || ('L' + simCell.level));
    var slug = colonyId.split('-').slice(1).join('-') || colonyId;
    return (slug ? slug + ' · ' : '') + levelSeq;
  }

  // Clear SVG completely and build two explicit sub-groups so the layer
  // order is obvious: edges on the bottom, cells on top, always.
  while (svg.lastChild) svg.removeChild(svg.lastChild);

  var viewX = 0, viewY = 0, viewScale = 1;
  var group = buildSVGEl('g', { id: 'dag-group' });
  svg.appendChild(group);
  var edgeLayer = buildSVGEl('g', { class: 'dag-edge-layer' });
  var cellLayer = buildSVGEl('g', { class: 'dag-cell-layer' });
  group.appendChild(edgeLayer);
  group.appendChild(cellLayer);

  // Edges — straight lines from source border to target border, on
  // the bottom layer. Replaces the previous two-segment elbow paths,
  // which looked noisy on dense colony graphs.
  simEdges.forEach(function(edge) {
    var src = simMap[edge.source];
    var tgt = simMap[edge.target];
    if (!src || !tgt) return;
    edgeLayer.appendChild(buildSVGEl('path', {
      d: straightPath(src, tgt),
      class: 'dag-edge ' + (edge.kind === 'cross' ? 'cross' : 'intra'),
    }));
  });

  // Cells — rectangular rects with foreignObject HTML content, top layer.
  simCells.forEach(function(simCell) {
    var groupClasses = ['dag-cell'];
    if (simCell.isCenter) groupClasses.push('is-seed');
    if (simCell.isGhost)  groupClasses.push('is-ghost');
    var cellGroup = buildSVGEl('g', { class: groupClasses.join(' '), 'data-id': simCell.id });

    var isActive = !!activeSet[simCell.id];
    var statusColor = STATUS_COLORS[simCell.data.status] || '#001018';
    // Seed hub keeps the Petri brand green border; other cells use cyan.
    var borderColor = simCell.isCenter ? '#00ff88' : '#00ccff';
    var halfW = simCell.width  / 2;
    var halfH = simCell.height / 2;
    var rx = Math.round(simCell.x - halfW);
    var ry = Math.round(simCell.y - halfH);

    // Active-cell pulse — yellow dashed outer ring, pulses via @keyframes.
    if (isActive) {
      cellGroup.appendChild(buildSVGEl('rect', {
        x: String(rx - 4), y: String(ry - 4),
        width:  String(simCell.width  + 8),
        height: String(simCell.height + 8),
        fill: 'none', stroke: '#ffcc00', 'stroke-width': '1',
        'stroke-dasharray': '2 2',
        class: 'cell-active',
      }));
    }

    cellGroup.appendChild(buildSVGEl('rect', {
      x: String(rx), y: String(ry),
      width:  String(simCell.width),
      height: String(simCell.height),
      fill: statusColor,
      stroke: borderColor,
      'stroke-width': String(simCell.borderWidth),
      opacity: simCell.isGhost ? '0.75' : '1',
    }));

    // Seed hub "H" glyph — tucked into the top-left corner of the cell
    // body so it doesn't collide with the HTML label content.
    if (simCell.isCenter) {
      var markX = rx + 6;
      var markY = ry + 6;
      [[0, 0, 1, 6], [4, 0, 1, 6], [1, 2, 3, 1]].forEach(function(segment) {
        cellGroup.appendChild(buildSVGEl('rect', {
          x: String(markX + segment[0]),
          y: String(markY + segment[1]),
          width:  String(segment[2]),
          height: String(segment[3]),
          fill: '#00ff88',
        }));
      });
    }

    // HTML body: ID line + wrapped claim text via <foreignObject>.
    var fo = buildSVGEl('foreignObject', {
      x: String(rx), y: String(ry),
      width:  String(simCell.width),
      height: String(simCell.height),
    });
    var body = document.createElement('div');
    body.className = 'cell-body';

    var idDiv = document.createElement('div');
    idDiv.className = 'cell-id';
    idDiv.textContent = cellIdLabel(simCell);
    body.appendChild(idDiv);

    var claimDiv = document.createElement('div');
    claimDiv.className = 'cell-claim';
    claimDiv.textContent = simCell.data.claim_text || '(no claim text)';
    body.appendChild(claimDiv);

    fo.appendChild(body);
    cellGroup.appendChild(fo);

    cellGroup.addEventListener('click', function() {
      if (simCell.isGhost) { navigate('colony', simCell.data.colony_id); }
      else                 { navigate('cell', simCell.id); }
    });

    var tooltip = document.getElementById('dag-tooltip');
    cellGroup.addEventListener('mouseenter', function(evt) {
      tooltip.textContent = '';
      var claimLine = buildEl('div', { className: 'tt-claim' }, simCell.data.claim_text || simCell.id);
      var statusSpan = buildEl('span', { className: 'tt-status', style: { background: statusColor } }, simCell.data.status);
      var levelSpan = buildEl('span', { style: { marginLeft: '8px', color: '#5fa8b8', fontSize: '9px', letterSpacing: '1px' } }, 'LVL ' + simCell.data.level);
      tooltip.appendChild(claimLine);
      tooltip.appendChild(statusSpan);
      tooltip.appendChild(levelSpan);
      tooltip.style.display = 'block';
      tooltip.style.left = (evt.clientX + 12) + 'px';
      tooltip.style.top = (evt.clientY + 12) + 'px';
    });
    cellGroup.addEventListener('mousemove', function(evt) {
      tooltip.style.left = (evt.clientX + 12) + 'px';
      tooltip.style.top = (evt.clientY + 12) + 'px';
    });
    cellGroup.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });

    cellLayer.appendChild(cellGroup);
  });

  // Pan & Zoom — preserved. Guard against starting a pan from HUD chrome.
  var isPanning = false, panStartX = 0, panStartY = 0;
  function updateTransform() {
    group.setAttribute('transform', 'translate(' + viewX + ',' + viewY + ') scale(' + viewScale + ')');
  }
  container.addEventListener('mousedown', function(evt) {
    if (evt.target.closest('.dag-cell') ||
        evt.target.closest('.dag-back') ||
        evt.target.closest('.dag-hud-top') ||
        evt.target.closest('.dag-hud-bottom')) return;
    isPanning = true;
    panStartX = evt.clientX - viewX;
    panStartY = evt.clientY - viewY;
    container.classList.add('grabbing');
  });
  document.addEventListener('mousemove', function(evt) {
    if (!isPanning) return;
    viewX = evt.clientX - panStartX;
    viewY = evt.clientY - panStartY;
    updateTransform();
  });
  document.addEventListener('mouseup', function() { isPanning = false; container.classList.remove('grabbing'); });
  container.addEventListener('wheel', function(evt) {
    evt.preventDefault();
    var delta = evt.deltaY > 0 ? 0.9 : 1.1;
    var newScale = Math.max(0.2, Math.min(5, viewScale * delta));
    var rect = container.getBoundingClientRect();
    var mx = evt.clientX - rect.left, my = evt.clientY - rect.top;
    viewX = mx - (mx - viewX) * (newScale / viewScale);
    viewY = my - (my - viewY) * (newScale / viewScale);
    viewScale = newScale;
    updateTransform();
  }, { passive: false });
}

function renderDAGLegend() {
  var legend = document.getElementById('dag-legend');
  legend.textContent = '';
  ['NEW', 'RESEARCH', 'RED_TEAM', 'VALIDATED', 'DISPROVEN', 'STALLED'].forEach(function(status) {
    var chip = buildEl('span', { className: 'legend-chip' });
    chip.appendChild(buildEl('span', { className: 'legend-swatch', style: { background: STATUS_COLORS[status] } }));
    chip.appendChild(document.createTextNode(status));
    legend.appendChild(chip);
  });
}

// ── Research Logs ───────────────────────────────────────────────────────

function loadLogs() {
  fetchJSON('/api/events?limit=200').then(function(events) {
    var feed = document.getElementById('logs-feed');
    feed.textContent = '';
    events.reverse().forEach(function(evt) { appendLogRow(evt, true); });
    if (events.length === 0) {
      feed.appendChild(buildEl('div', { className: 'logs-empty' }, 'No events recorded yet. Run petri grow to start.'));
    }
  });
}

function appendLogRow(evt, skipScroll) {
  var feed = document.getElementById('logs-feed');

  var filterCell = document.getElementById('filter-cell').value.toLowerCase();
  var filterAgent = document.getElementById('filter-agent').value.toLowerCase();
  var filterType = document.getElementById('filter-type').value;

  if (filterCell && (evt.cell_id || '').toLowerCase().indexOf(filterCell) === -1) return;
  if (filterAgent && (evt.agent || '').toLowerCase().indexOf(filterAgent) === -1) return;
  if (filterType && evt.type !== filterType) return;

  var empty = feed.querySelector('.logs-empty');
  if (empty) empty.remove();

  var row = buildEl('div', { className: 'log-row' });
  var time = (evt.timestamp || '').substring(11, 19) || '--:--:--';
  var typeColor = EVENT_COLORS[evt.type] || '#666';

  row.appendChild(buildEl('span', { className: 'log-time' }, time));
  var badge = buildEl('span', { className: 'log-type-badge', style: { background: typeColor + '22', color: typeColor } }, (evt.type || '').replace(/_/g, ' '));
  row.appendChild(badge);
  row.appendChild(buildEl('span', { className: 'log-agent' }, evt.agent || ''));
  row.appendChild(buildEl('span', { className: 'log-cell', onclick: function() { navigate('cell', evt.cell_id); } }, evt.cell_id || ''));
  row.appendChild(buildEl('span', { className: 'log-iter' }, 'iter ' + (evt.iteration || 0)));

  feed.insertBefore(row, feed.firstChild);
  while (feed.children.length > 500) feed.removeChild(feed.lastChild);
  if (!skipScroll) feed.scrollTop = 0;
}

['filter-cell', 'filter-agent', 'filter-type'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', function() {
    if (State.currentView === 'logs') loadLogs();
  });
});

// ── Cell Detail ─────────────────────────────────────────────────────────

function loadCellDetail(cellId) {
  var container = document.getElementById('cell-content');
  container.textContent = '';
  var loading = buildEl('div', { className: 'loading' });
  loading.appendChild(buildEl('span', { className: 'spinner' }));
  loading.appendChild(document.createTextNode('Loading cell...'));
  container.appendChild(loading);

  fetchJSON('/api/cell/' + encodeURIComponent(cellId)).then(function(cell) {
    renderCellDetail(cell);
  }).catch(function() {
    container.textContent = '';
    container.appendChild(buildEl('div', { className: 'loading' }, 'Cell not found: ' + cellId));
  });
}

function renderCellDetail(cell) {
  var container = document.getElementById('cell-content');
  container.textContent = '';
  var statusColor = STATUS_COLORS[cell.status] || '#555';
  var events = cell.events || [];

  // ── Back link ──
  var backDiv = buildEl('div', { className: 'cell-back' });
  backDiv.appendChild(buildEl('button', { className: 'hud-btn', onclick: function() { history.back(); } }, '\u2190 BACK'));
  container.appendChild(backDiv);

  // ── 1. Research Tag ──
  container.appendChild(buildEl('div', { className: 'research-tag' }, '\u25B8 Research Cell'));

  // ── 2. Title + status badge ──
  var header = buildEl('div', { className: 'cell-header' });
  header.appendChild(buildEl('div', { className: 'cell-claim-text' }, cell.claim_text || cell.cell_id));
  header.appendChild(buildEl('span', {
    className: 'cell-status-badge',
    style: { background: statusColor + '22', color: statusColor },
  }, cell.status));
  container.appendChild(header);

  // ── 3. Info Cards (meta grid) ──
  container.appendChild(buildEl('div', { className: 'lab-section-label' }, 'Info'));
  var metaGrid = buildEl('div', { className: 'cell-meta-grid' });

  function addMetaItem(label, valueContent) {
    var item = buildEl('div', { className: 'hud-panel compact' });
    item.appendChild(buildEl('div', { className: 'meta-item-label' }, label));
    var valDiv = buildEl('div', { className: 'meta-item-value' });
    if (typeof valueContent === 'string') valDiv.textContent = valueContent;
    else valDiv.appendChild(valueContent);
    item.appendChild(valDiv);
    metaGrid.appendChild(item);
  }

  addMetaItem('Cell ID', cell.cell_id);
  addMetaItem('Colony', cell.colony_id || '');
  addMetaItem('Level', String(cell.level));

  var depsDiv = document.createDocumentFragment();
  (cell.dependencies || []).forEach(function(depId) {
    var link = buildEl('span', { className: 'meta-item-value link', onclick: function() { navigate('cell', depId); } }, depId);
    depsDiv.appendChild(link);
    depsDiv.appendChild(document.createElement('br'));
  });
  if ((cell.dependencies || []).length === 0) depsDiv.appendChild(buildEl('span', { style: { color: '#5fa8b8' } }, 'None'));
  addMetaItem('Dependencies (' + (cell.dependencies || []).length + ')', depsDiv);

  var depntsDiv = document.createDocumentFragment();
  (cell.dependents || []).forEach(function(depId) {
    depntsDiv.appendChild(buildEl('span', { className: 'meta-item-value link', onclick: function() { navigate('cell', depId); } }, depId));
    depntsDiv.appendChild(document.createElement('br'));
  });
  if ((cell.dependents || []).length === 0) depntsDiv.appendChild(buildEl('span', { style: { color: '#5fa8b8' } }, 'None'));
  addMetaItem('Dependents (' + (cell.dependents || []).length + ')', depntsDiv);

  container.appendChild(metaGrid);

  // ── 4. Verdicts ──
  var verdicts = events.filter(function(evt) { return evt.type === 'verdict_issued'; });
  container.appendChild(buildEl('div', { className: 'lab-section-label' }, 'Verdicts'));
  var verdictSection = buildEl('div', { className: 'verdict-section' });
  if (verdicts.length > 0) {
    var table = buildEl('table', { className: 'verdict-table' });
    var thead = buildEl('thead');
    var headRow = buildEl('tr');
    ['Agent', 'Verdict', 'Confidence', 'Iteration'].forEach(function(h) { headRow.appendChild(buildEl('th', {}, h)); });
    thead.appendChild(headRow);
    table.appendChild(thead);

    var tbody = buildEl('tbody');
    verdicts.forEach(function(evt) {
      var verdict = (evt.data && evt.data.verdict) || '';
      var isPass = PASS_VERDICTS.has(verdict);
      var row = buildEl('tr');
      row.appendChild(buildEl('td', {}, evt.agent || ''));
      row.appendChild(buildEl('td', { className: isPass ? 'verdict-pass' : 'verdict-block' }, verdict));
      row.appendChild(buildEl('td', {}, String((evt.data && evt.data.confidence) || '')));
      row.appendChild(buildEl('td', {}, String(evt.iteration)));
      tbody.appendChild(row);
    });
    table.appendChild(tbody);
    verdictSection.appendChild(table);
  } else {
    verdictSection.appendChild(buildEl('div', { className: 'citations-empty' }, 'No verdicts issued yet.'));
  }
  container.appendChild(verdictSection);

  // ── 5. Evidence (markdown rendered) ──
  container.appendChild(buildEl('div', { className: 'lab-section-label' }, 'Evidence'));
  var evidenceSection = buildEl('div', { className: 'evidence-section' });
  var evidenceMd = cell.evidence_md || '';
  if (evidenceMd.trim().length > 0 && typeof marked !== 'undefined' && typeof DOMPurify !== 'undefined') {
    var mdPanel = buildEl('div', { className: 'hud-panel' });
    var mdBody = buildEl('div', { className: 'evidence-markdown' });
    // Render markdown → HTML → sanitize via DOMPurify before touching
    // the DOM. DOMPurify strips <script>, inline event handlers, and
    // anything else that could execute; this is the only place we set
    // innerHTML in the whole SPA.
    try {
      var rawHtml = marked.parse(evidenceMd, { breaks: true, gfm: true });
      mdBody.innerHTML = DOMPurify.sanitize(rawHtml, { USE_PROFILES: { html: true } });
    } catch (err) {
      mdBody.textContent = evidenceMd;
    }
    mdPanel.appendChild(mdBody);
    evidenceSection.appendChild(mdPanel);
  } else if (evidenceMd.trim().length > 0) {
    // Fallback: renderer libs failed to load — display raw markdown as
    // preformatted text so the user still sees the content.
    var pre = buildEl('pre', { className: 'expand-content', style: { display: 'block' } }, evidenceMd);
    evidenceSection.appendChild(pre);
  } else {
    evidenceSection.appendChild(buildEl('div', { className: 'evidence-empty' }, 'No evidence recorded for this cell yet.'));
  }
  container.appendChild(evidenceSection);

  // ── 6. Citations (source_reviewed events with URL + finding) ──
  container.appendChild(buildEl('div', { className: 'lab-section-label' }, 'Citations'));
  var citationsSection = buildEl('div', { className: 'citations-section' });
  var sourceEvents = events.filter(function(evt) { return evt.type === 'source_reviewed' && evt.data && evt.data.url; });
  if (sourceEvents.length > 0) {
    var citationsList = buildEl('div', { className: 'citations-list' });
    sourceEvents.forEach(function(evt) {
      var data = evt.data || {};
      var card = buildEl('div', { className: 'hud-panel compact citation-card' });

      var titleLink = buildEl('a', {
        className: 'citation-title',
        href: data.url,
        target: '_blank',
        rel: 'noopener noreferrer',
      }, data.title || data.url);
      card.appendChild(titleLink);

      var urlEl = buildEl('span', { className: 'citation-url' }, data.url);
      card.appendChild(urlEl);

      var metaRow = buildEl('div', { className: 'citation-meta' });
      var direction = (data.supports_or_contradicts || '').toLowerCase();
      if (direction) {
        var dirClass = 'neutral';
        if (direction.indexOf('support') !== -1) dirClass = 'supports';
        else if (direction.indexOf('contradict') !== -1) dirClass = 'contradicts';
        metaRow.appendChild(buildEl('span', { className: 'citation-direction ' + dirClass }, direction));
      }
      if (data.hierarchy_level) {
        metaRow.appendChild(buildEl('span', { className: 'citation-hierarchy' }, 'Level ' + data.hierarchy_level));
      }
      metaRow.appendChild(buildEl('span', { className: 'citation-agent' }, 'via ' + (evt.agent || 'unknown')));
      card.appendChild(metaRow);

      if (data.finding) {
        card.appendChild(buildEl('div', { className: 'citation-finding' }, data.finding));
      }
      citationsList.appendChild(card);
    });
    citationsSection.appendChild(citationsList);
  } else {
    citationsSection.appendChild(buildEl('div', { className: 'citations-empty' }, 'No citations recorded for this cell yet.'));
  }
  container.appendChild(citationsSection);

  // ── 7. Cell Logs (friendly-rendered, no raw JSON) ──
  container.appendChild(buildEl('div', { className: 'lab-section-label' }, 'Cell Logs (' + events.length + ' events)'));
  var logsSection = buildEl('div', { className: 'cell-logs-section' });
  if (events.length > 0) {
    // Most-recent first, across all iterations.
    var sortedEvents = events.slice().sort(function(a, b) {
      return (b.timestamp || '').localeCompare(a.timestamp || '');
    });
    sortedEvents.forEach(function(evt) {
      logsSection.appendChild(renderCellLogRow(evt));
    });
  } else {
    logsSection.appendChild(buildEl('div', { className: 'cell-logs-empty' }, 'No events recorded for this cell yet.'));
  }
  container.appendChild(logsSection);
}

// Render a single event log row with human-readable body instead of
// raw JSON. Each event type gets its own formatting so the reader
// sees "Reviewed <url> (SUPPORTS)" instead of a JSON blob.
function renderCellLogRow(evt) {
  var data = evt.data || {};
  var typeColor = EVENT_COLORS[evt.type] || '#5fa8b8';
  var time = (evt.timestamp || '').substring(11, 19) || '--:--:--';

  var row = buildEl('div', { className: 'cell-log-row' });
  row.appendChild(buildEl('span', { className: 'cell-log-time' }, time));

  var typeBadge = buildEl('span', {
    className: 'cell-log-type',
    style: { background: typeColor + '22', color: typeColor, borderColor: typeColor },
  }, (evt.type || '').replace(/_/g, ' '));
  row.appendChild(typeBadge);

  var body = buildEl('div', { className: 'cell-log-body' });

  // Event-type-specific friendly formatting. All user-supplied strings
  // go through textContent/createTextNode so there's no XSS path.
  if (evt.type === 'verdict_issued') {
    var verdict = data.verdict || '';
    var isPass = PASS_VERDICTS.has(verdict);
    body.appendChild(buildEl('strong', {}, verdict || '—'));
    body.appendChild(document.createTextNode(' '));
    body.appendChild(buildEl('span', {
      className: isPass ? 'cell-log-verdict-pass' : 'cell-log-verdict-fail',
    }, isPass ? 'PASS' : 'BLOCK'));
    if (typeof data.confidence !== 'undefined' && data.confidence !== null) {
      body.appendChild(document.createTextNode(' · confidence ' + data.confidence));
    }
    if (data.summary) {
      body.appendChild(document.createElement('br'));
      body.appendChild(document.createTextNode(String(data.summary).substring(0, 280)));
    }
  } else if (evt.type === 'search_executed') {
    body.appendChild(document.createTextNode('Searched: '));
    body.appendChild(buildEl('strong', {}, '"' + (data.query || '') + '"'));
    if (data.sources_found) {
      body.appendChild(document.createTextNode(' · ' + data.sources_found + ' sources'));
    }
  } else if (evt.type === 'source_reviewed') {
    if (data.url) {
      var srcLink = buildEl('a', {
        href: data.url,
        target: '_blank',
        rel: 'noopener noreferrer',
      }, data.title || data.url);
      body.appendChild(srcLink);
    } else {
      body.appendChild(buildEl('strong', {}, data.title || 'Unknown source'));
    }
    if (data.supports_or_contradicts) {
      body.appendChild(document.createTextNode(' · '));
      body.appendChild(buildEl('strong', {}, String(data.supports_or_contradicts).toUpperCase()));
    }
    if (data.finding) {
      body.appendChild(document.createElement('br'));
      body.appendChild(document.createTextNode(String(data.finding).substring(0, 200)));
    }
  } else if (evt.type === 'evidence_appended') {
    body.appendChild(document.createTextNode(data.summary || 'Evidence appended'));
  } else if (evt.type === 'debate_mediated') {
    body.appendChild(document.createTextNode('Debate: '));
    body.appendChild(buildEl('strong', {}, (data.from_agent || '?') + ' vs ' + (data.to_agent || '?')));
    if (data.summary) {
      body.appendChild(document.createElement('br'));
      body.appendChild(document.createTextNode(String(data.summary).substring(0, 200)));
    }
  } else if (evt.type === 'convergence_checked') {
    var converged = !!data.converged;
    body.appendChild(buildEl('strong', {
      className: converged ? 'cell-log-verdict-pass' : 'cell-log-verdict-fail',
    }, converged ? 'CONVERGED' : 'NOT CONVERGED'));
    if (data.weakest_link) {
      body.appendChild(document.createTextNode(' · weakest: ' + data.weakest_link));
    }
  } else if (evt.type === 'cell_reopened' || evt.type === 'propagation_triggered') {
    body.appendChild(document.createTextNode(data.reason || data.summary || evt.type.replace(/_/g, ' ')));
  } else if (evt.type === 'decomposition_created') {
    var childCount = (data.child_cell_ids || []).length;
    body.appendChild(document.createTextNode('Decomposed into ' + childCount + ' child cell' + (childCount === 1 ? '' : 's')));
  } else if (evt.type === 'decomposition_audit') {
    body.appendChild(document.createTextNode(data.summary || 'Decomposition audited'));
  } else if (data.summary) {
    body.appendChild(document.createTextNode(data.summary));
  } else {
    // Unknown event type — show a terse single-line key=value pair dump
    // (still human-readable, no stringified JSON braces).
    var parts = [];
    Object.keys(data).slice(0, 4).forEach(function(k) {
      var v = data[k];
      if (typeof v === 'string') parts.push(k + '=' + v.substring(0, 60));
      else if (typeof v === 'number' || typeof v === 'boolean') parts.push(k + '=' + v);
    });
    body.appendChild(document.createTextNode(parts.join(' · ') || '—'));
  }

  // Agent attribution (small line under body).
  body.appendChild(buildEl('span', { className: 'cell-log-agent' }, (evt.agent || 'unknown') + ' · iter ' + (evt.iteration || 0)));

  row.appendChild(body);
  return row;
}

// ── CRT Onboarding Terminal ─────────────────────────────────────────────

function startOnboarding() {
  var output = document.getElementById('crt-output');
  output.textContent = '';

  var config = { name: '', model: 'claude-sonnet-4-6', max_concurrent: 4, max_iterations: 3 };

  function addLine(text, className) {
    return new Promise(function(resolve) {
      var line = buildEl('div', { className: 'term-line' + (className ? ' ' + className : '') });
      output.appendChild(line);
      typeText(line, text, 0, resolve);
      output.scrollTop = output.scrollHeight;
    });
  }

  function addLineInstant(text, className) {
    var line = buildEl('div', { className: 'term-line' + (className ? ' ' + className : '') }, text);
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
  }

  function typeText(el, text, idx, resolve) {
    if (idx < text.length) {
      el.textContent = text.substring(0, idx + 1);
      setTimeout(function() { typeText(el, text, idx + 1, resolve); }, 15);
    } else if (resolve) resolve();
  }

  function waitFor(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  function promptText(promptStr, defaultVal) {
    return new Promise(function(resolve) {
      var wrap = buildEl('div', { className: 'term-input-wrap' });
      var prompt = buildEl('span', { className: 'term-prompt' }, promptStr + ' ');
      var input = buildEl('input', { className: 'term-input', type: 'text', value: defaultVal || '' });
      wrap.appendChild(prompt);
      wrap.appendChild(input);
      output.appendChild(wrap);
      output.scrollTop = output.scrollHeight;
      input.focus();
      input.addEventListener('keydown', function(evt) {
        if (evt.key === 'Enter') {
          var val = input.value.trim() || defaultVal || '';
          input.disabled = true;
          input.style.color = '#66ffbb';
          resolve(val);
        }
      });
    });
  }

  function promptSelect(promptStr, options, defaultIdx) {
    return new Promise(function(resolve) {
      addLineInstant(promptStr, 'bright');
      var selected = defaultIdx || 0;
      var optEls = [];

      options.forEach(function(opt, idx) {
        var optEl = buildEl('div', { className: 'term-option' + (idx === selected ? ' selected' : '') });
        optEl.textContent = opt.label;
        optEl.addEventListener('click', function() { cleanup(); resolve(opt.value); });
        optEls.push(optEl);
        output.appendChild(optEl);
      });

      function updateSelection() {
        optEls.forEach(function(el, idx) { el.classList.toggle('selected', idx === selected); });
        output.scrollTop = output.scrollHeight;
      }

      function handleKey(evt) {
        if (evt.key === 'ArrowUp') { evt.preventDefault(); selected = Math.max(0, selected - 1); updateSelection(); }
        else if (evt.key === 'ArrowDown') { evt.preventDefault(); selected = Math.min(options.length - 1, selected + 1); updateSelection(); }
        else if (evt.key === 'Enter') { evt.preventDefault(); cleanup(); resolve(options[selected].value); }
      }

      function cleanup() {
        document.removeEventListener('keydown', handleKey);
        optEls.forEach(function(el) { el.style.pointerEvents = 'none'; });
      }

      document.addEventListener('keydown', handleKey);
      output.scrollTop = output.scrollHeight;
    });
  }

  (async function runOnboarding() {
    await addLine('PETRI RESEARCH OS $petri_version', 'bright');
    await waitFor(300);
    await addLine('Initializing subsystems...', 'dim');
    await waitFor(200);
    addLineInstant('[OK] Event log engine', 'dim');
    await waitFor(150);
    addLineInstant('[OK] Queue state machine (13 states)', 'dim');
    await waitFor(150);
    addLineInstant('[OK] Agent roster (13 agents)', 'dim');
    await waitFor(150);
    addLineInstant('[OK] Convergence checker', 'dim');
    await waitFor(150);
    addLineInstant('[OK] Colony graph engine', 'dim');
    await waitFor(400);
    addLineInstant('');
    await addLine('No petri dish detected. Starting initialization...', 'bright');
    addLineInstant('');
    await addLine('$ petri init', 'bright');
    addLineInstant('');

    config.name = await promptText('Dish name [my-research]:', 'my-research');
    addLineInstant('');

    config.model = await promptSelect('Inference model:', [
      { label: 'claude-sonnet-4-6  (fast, cost-effective)', value: 'claude-sonnet-4-6' },
      { label: 'claude-opus-4-6  (most capable, higher cost)', value: 'claude-opus-4-6' },
    ], 0);
    addLineInstant('  Selected: ' + config.model, 'dim');
    addLineInstant('');

    var concStr = await promptText('Max concurrent agents [4]:', '4');
    config.max_concurrent = parseInt(concStr, 10) || 4;
    addLineInstant('');

    var iterStr = await promptText('Max iterations per cycle [3]:', '3');
    config.max_iterations = parseInt(iterStr, 10) || 3;
    addLineInstant('');

    await addLine('Initializing petri dish...', 'bright');

    try {
      var initRes = await fetch(API + '/api/init', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(config),
      });
      var initData = await initRes.json();
      if (initData.status === 'ok' || initData.status === 'already_exists') {
        addLineInstant('[OK] Dish "' + config.name + '" initialized', 'bright');
      } else {
        addLineInstant('[ERROR] ' + JSON.stringify(initData), 'error');
      }
    } catch (err) {
      addLineInstant('[ERROR] Init failed: ' + err.message, 'error');
    }

    addLineInstant('');
    await waitFor(500);

    var starterClaim = '$starter_claim';
    await addLine('$ petri seed "' + starterClaim + '"', 'bright');
    addLineInstant('');
    await addLine('Decomposing claim into colony structure...', 'dim');
    await addLine('This may take a moment (LLM inference)...', 'dim');
    addLineInstant('');

    try {
      var seedRes = await fetch(API + '/api/seed', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ claim: starterClaim }),
      });
      var seedData = await seedRes.json();
      if (seedData.status === 'ok') {
        addLineInstant('[OK] Colony "' + seedData.colony_name + '" created with ' + seedData.cell_count + ' cells', 'bright');
        addLineInstant('');
        if (seedData.cells) {
          seedData.cells.forEach(function(nd) {
            addLineInstant('  L' + nd.level + '  ' + (nd.claim_text || '').substring(0, 60), 'dim');
          });
        }
      } else {
        addLineInstant('[WARN] Seed returned: ' + JSON.stringify(seedData), 'error');
      }
    } catch (err) {
      addLineInstant('[WARN] Seed failed: ' + err.message + '. You can seed later via CLI.', 'error');
    }

    addLineInstant('');
    await waitFor(800);
    await addLine('Initialization complete. Switching to command mode.', 'bright');
    await waitFor(800);
    termEnterCommandMode();
  })();
}

// ── Computer Terminal (command mode) ────────────────────────────────────

var TerminalState = {
  mode: null,       // null | 'onboarding' | 'idle' | 'running'
  sessionId: null,
  eventSource: null,
  history: [],
  historyIndex: -1,
  detachNext: false,
  inputHandlerBound: false,
};

var XTERM = null;
var XTERM_FIT = null;
var XTERM_DECODER = null;

var PETRI_SUBCOMMANDS = [
  'init', 'seed', 'grow', 'check', 'feed', 'stop',
  'scan', 'graph', 'connect', 'inspect', 'launch',
];

// ANSI SGR color helpers for system/banner/event lines written to xterm.
var ANSI = {
  reset:    '\x1b[0m',
  dim:      '\x1b[2m',
  bold:     '\x1b[1m',
  red:      '\x1b[91m',
  green:    '\x1b[92m',
  yellow:   '\x1b[93m',
  blue:     '\x1b[94m',
  magenta:  '\x1b[95m',
  cyan:     '\x1b[96m',
  white:    '\x1b[97m',
  grey:     '\x1b[90m',
};

function termInitXterm() {
  if (XTERM) return XTERM;
  if (typeof Terminal === 'undefined') {
    return null;  // xterm.js CDN failed to load — caller falls back
  }
  var mount = document.getElementById('crt-xterm');
  if (!mount) return null;
  mount.style.display = 'block';

  XTERM = new Terminal({
    cursorBlink: true,
    fontFamily: "'SF Mono', 'Fira Code', 'Cascadia Code', monospace",
    fontSize: 13,
    lineHeight: 1.2,
    scrollback: 5000,
    convertEol: true,
    theme: {
      background: '#000800',
      foreground: '#00ff88',
      cursor: '#00ff88',
      cursorAccent: '#000800',
      selectionBackground: 'rgba(0, 255, 136, 0.35)',
      black:         '#000800',
      red:           '#ff6b6b',
      green:         '#00ff88',
      yellow:        '#ffcc00',
      blue:          '#00ccff',
      magenta:       '#ff3399',
      cyan:          '#66ffbb',
      white:         '#e0f0ff',
      brightBlack:   '#116644',
      brightRed:     '#ff9999',
      brightGreen:   '#66ffbb',
      brightYellow:  '#ffee66',
      brightBlue:    '#66ccff',
      brightMagenta: '#ff66bb',
      brightCyan:    '#99ffdd',
      brightWhite:   '#ffffff',
    },
  });

  if (typeof FitAddon !== 'undefined') {
    XTERM_FIT = new FitAddon.FitAddon();
    XTERM.loadAddon(XTERM_FIT);
  }
  XTERM.open(mount);
  if (XTERM_FIT) {
    try { XTERM_FIT.fit(); } catch (e) {}
  }
  // Refit on viewport changes so the terminal grows with the window.
  window.addEventListener('resize', function() {
    if (XTERM_FIT) { try { XTERM_FIT.fit(); } catch (e) {} }
  });

  XTERM_DECODER = (typeof TextDecoder !== 'undefined')
    ? new TextDecoder('utf-8', { fatal: false })
    : null;

  return XTERM;
}

// Decode a base64-encoded byte chunk from the backend PTY into a form
// xterm.write can consume. Prefer Uint8Array so escape bytes survive
// untouched; fall back to a string if TextDecoder is unavailable.
function termDecodeB64Chunk(b64) {
  var bin = atob(b64);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function xtermWriteRaw(chunkBytes) {
  if (XTERM) XTERM.write(chunkBytes);
}

function xtermWriteLine(text, color) {
  if (!XTERM) {
    termAppend('stdout', text);
    return;
  }
  var prefix = color ? ANSI[color] : '';
  var suffix = color ? ANSI.reset : '';
  XTERM.writeln(prefix + text + suffix);
}

function termOutput() { return document.getElementById('crt-output'); }

function termAppend(kind, text) {
  // Before command mode, and for the onboarding wizard, output still
  // flows into the static #crt-output div as styled HTML lines.
  var output = termOutput();
  if (!output) return;
  var line = buildEl('div', { className: 'term-line ' + kind });
  line.textContent = text;
  output.appendChild(line);
  var nearBottom = output.scrollHeight - output.scrollTop - output.clientHeight < 120;
  if (nearBottom) output.scrollTop = output.scrollHeight;
  while (output.children.length > 2000) output.removeChild(output.firstChild);
}

function termSetRunning(running) {
  TerminalState.mode = running ? 'running' : 'idle';
  var stopBtn = document.getElementById('term-stop-btn');
  if (stopBtn) stopBtn.disabled = !running;
}

function termTokenize(raw) {
  var tokens = [];
  var buf = '';
  var inQuote = false;
  for (var i = 0; i < raw.length; i++) {
    var ch = raw[i];
    if (ch === '"') { inQuote = !inQuote; continue; }
    if (ch === ' ' && !inQuote) {
      if (buf.length) { tokens.push(buf); buf = ''; }
      continue;
    }
    buf += ch;
  }
  if (buf.length) tokens.push(buf);
  return tokens;
}

function termBindInputHandlers() {
  var input = document.getElementById('term-cmd');
  var stopBtn = document.getElementById('term-stop-btn');
  var detachBtn = document.getElementById('term-detach-btn');
  if (!input || TerminalState.inputHandlerBound) return;
  TerminalState.inputHandlerBound = true;

  input.addEventListener('keydown', function(evt) {
    if (evt.key === 'Enter') {
      evt.preventDefault();
      var raw = input.value.trim();
      if (raw.length === 0) return;
      TerminalState.history.push(raw);
      TerminalState.historyIndex = -1;
      input.value = '';
      termRun(raw);
    } else if (evt.key === 'ArrowUp') {
      if (TerminalState.history.length === 0) return;
      evt.preventDefault();
      if (TerminalState.historyIndex === -1) {
        TerminalState.historyIndex = TerminalState.history.length - 1;
      } else if (TerminalState.historyIndex > 0) {
        TerminalState.historyIndex--;
      }
      input.value = TerminalState.history[TerminalState.historyIndex];
    } else if (evt.key === 'ArrowDown') {
      if (TerminalState.historyIndex === -1) return;
      evt.preventDefault();
      if (TerminalState.historyIndex < TerminalState.history.length - 1) {
        TerminalState.historyIndex++;
        input.value = TerminalState.history[TerminalState.historyIndex];
      } else {
        TerminalState.historyIndex = -1;
        input.value = '';
      }
    } else if ((evt.ctrlKey || evt.metaKey) && evt.key === 'c' && TerminalState.mode === 'running') {
      evt.preventDefault();
      termStop();
    }
  });

  stopBtn.addEventListener('click', termStop);
  detachBtn.addEventListener('click', function() {
    TerminalState.detachNext = !TerminalState.detachNext;
    detachBtn.classList.toggle('active', TerminalState.detachNext);
  });
}

function termEnterCommandMode() {
  TerminalState.mode = 'idle';
  var frame = document.getElementById('crt-frame');
  var inputRow = document.getElementById('crt-input-row');
  var output = document.getElementById('crt-output');
  if (frame) frame.classList.add('has-input');
  if (inputRow) inputRow.style.display = 'flex';

  // Hide the static onboarding output and bring xterm.js up.
  if (output) output.style.display = 'none';
  var term = termInitXterm();

  if (term) {
    // Boot banner inside xterm so it renders with the same font/colors
    // that command output will use.
    term.writeln('');
    term.writeln(ANSI.green + ANSI.bold + '─── PETRI COMPUTER · command mode ───' + ANSI.reset);
    term.writeln(ANSI.grey + 'type full commands:  ' + ANSI.yellow + 'petri check' + ANSI.grey +
                 '   ·   ' + ANSI.yellow + 'petri seed "your claim"' + ANSI.reset);
    term.writeln(ANSI.grey + 'subcommands: ' + PETRI_SUBCOMMANDS.join(' ') + ANSI.reset);
    term.writeln(ANSI.grey + 'up/down = history · enter = run · ctrl+c = stop · detach toggle bottom-right' + ANSI.reset);
    term.writeln('');
    // Refit once the terminal is actually mounted and sized.
    if (XTERM_FIT) { try { XTERM_FIT.fit(); } catch (e) {} }
  } else {
    // xterm.js failed to load — keep using the static HTML fallback.
    if (output) output.style.display = 'block';
    termAppend('system', '');
    termAppend('error', '[xterm.js failed to load — falling back to plain text streaming]');
    termAppend('bright', '─── command mode ───');
    termAppend('dim', 'type full commands like:  petri check   ·   petri seed "your claim"');
    termAppend('dim', 'subcommands: ' + PETRI_SUBCOMMANDS.join(' '));
    termAppend('dim', 'up/down = history · enter = run · ctrl+c = stop · detach toggle bottom-right');
    termAppend('system', '');
  }

  termBindInputHandlers();
  setTimeout(function() {
    var input = document.getElementById('term-cmd');
    if (input) input.focus();
  }, 30);
}

// Write a line to whichever output layer is active — xterm if mounted,
// otherwise the static #crt-output fallback.
function termEcho(kind, text) {
  if (XTERM) {
    var color = {
      cmd: 'yellow', stdout: 'white', stderr: 'red',
      system: 'cyan', dim: 'grey', bright: 'green', event: 'grey',
    }[kind] || 'white';
    xtermWriteLine(text, color);
  } else {
    termAppend(kind, text);
  }
}

function termRun(raw) {
  if (TerminalState.mode === 'running') {
    termEcho('system', '(a command is already running — press STOP first)');
    return;
  }
  var tokens = termTokenize(raw);
  if (tokens.length === 0) return;

  // Enforce `petri <subcommand> [args]` so the UX matches the real CLI.
  if (tokens[0] !== 'petri') {
    termEcho('stderr', 'Commands must start with "petri". Try: petri ' + (tokens[0] || 'check'));
    return;
  }
  if (tokens.length < 2) {
    termEcho('stderr', 'Missing subcommand. Try: petri check');
    return;
  }
  var command = tokens[1];
  var args = tokens.slice(2);

  if (PETRI_SUBCOMMANDS.indexOf(command) === -1) {
    termEcho('stderr', 'Unknown petri subcommand: ' + command);
    termEcho('dim', 'Allowed: ' + PETRI_SUBCOMMANDS.join(', '));
    return;
  }

  termEcho('cmd', '$ ' + raw);
  var detach = !!TerminalState.detachNext;

  fetch(API + '/api/proc/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ command: command, args: args, detach: detach }),
  }).then(function(res) {
    return res.json().then(function(data) { return { ok: res.ok, data: data }; });
  }).then(function(wrap) {
    if (!wrap.ok) {
      termEcho('stderr', 'start failed: ' + ((wrap.data && wrap.data.detail) || 'unknown'));
      return;
    }
    TerminalState.sessionId = wrap.data.stream_id;
    termSetRunning(true);

    if (detach) {
      termEcho('dim', '[detached; running in background as PID ' + wrap.data.pid + ']');
      TerminalState.sessionId = null;
      termSetRunning(false);
      return;
    }
    termStreamOutput(wrap.data.stream_id);
  }).catch(function(err) {
    termEcho('stderr', 'start failed: ' + err.message);
  });
}

function termStreamOutput(streamId) {
  if (TerminalState.eventSource) TerminalState.eventSource.close();
  var source = new EventSource(API + '/api/proc/stream/' + encodeURIComponent(streamId));
  TerminalState.eventSource = source;

  // The backend wraps every PTY chunk as {"line": "<base64>"}. Decode into
  // raw bytes and hand them straight to xterm.write — escape sequences and
  // carriage-return animations pass through untouched.
  function onChunk(evt) {
    var payload;
    try { payload = JSON.parse(evt.data); } catch (e) { return; }
    var raw = payload.line || '';
    if (XTERM) {
      xtermWriteRaw(termDecodeB64Chunk(raw));
    } else {
      // Fallback path: no xterm, so decode + strip ANSI for plain display.
      try {
        var bytes = termDecodeB64Chunk(raw);
        var text = new TextDecoder('utf-8', { fatal: false }).decode(bytes);
        text.split('\n').forEach(function(line) {
          if (line.length) termAppend('stdout', line.replace(/\x1b\[[0-9;]*[A-Za-z]/g, ''));
        });
      } catch (e) {}
    }
  }
  source.addEventListener('stdout', onChunk);
  source.addEventListener('stderr', onChunk);
  source.addEventListener('system', function(evt) {
    try { termEcho('system', JSON.parse(evt.data).line); } catch (e) {}
  });

  source.addEventListener('done', function(evt) {
    var payload = {};
    try { payload = JSON.parse(evt.data); } catch (e) {}
    var code = payload.code;
    if (XTERM) {
      var color = code === 0 ? ANSI.green : ANSI.red;
      XTERM.writeln('\r\n' + color + '[done ' + code + ']' + ANSI.reset);
    } else {
      var line = buildEl('div', { className: 'term-line done' + (code === 0 ? '' : ' fail') });
      line.textContent = '[done ' + code + ']';
      termOutput().appendChild(line);
    }
    source.close();
    TerminalState.eventSource = null;
    TerminalState.sessionId = null;
    termSetRunning(false);
  });
  source.onerror = function() {
    source.close();
    if (TerminalState.eventSource === source) {
      TerminalState.eventSource = null;
      termSetRunning(false);
    }
  };
}

function termStop() {
  if (!TerminalState.sessionId) return;
  fetch(API + '/api/proc/stop/' + encodeURIComponent(TerminalState.sessionId), { method: 'POST' })
    .catch(function() {});  // done event will fire regardless
}

function loadComputer() {
  // Re-entry to the Computer tab: if we were already in command mode,
  // just refocus the input and refit xterm to the (possibly changed)
  // viewport. Otherwise check for dishes and decide whether to run
  // onboarding or drop straight into command mode.
  if (TerminalState.mode === 'idle' || TerminalState.mode === 'running') {
    setTimeout(function() {
      var input = document.getElementById('term-cmd');
      if (input) input.focus();
      if (XTERM_FIT) { try { XTERM_FIT.fit(); } catch (e) {} }
    }, 30);
    return;
  }
  if (TerminalState.mode === 'onboarding') {
    // Wizard still running; don't restart.
    return;
  }

  // Fresh entry — make sure we're showing the onboarding layer, not
  // xterm (which only comes up after we know we're in command mode).
  var output = termOutput();
  if (output) {
    output.style.display = 'block';
    output.textContent = '';
  }
  var xtermMount = document.getElementById('crt-xterm');
  if (xtermMount) xtermMount.style.display = 'none';

  fetch(API + '/api/dishes').then(function(res) { return res.json(); }).then(function(dishes) {
    if (Array.isArray(dishes) && dishes.length > 0) {
      termEnterCommandMode();
      if (XTERM) {
        XTERM.writeln(ANSI.green + 'PETRI COMPUTER · localhost' + ANSI.reset);
        XTERM.writeln(ANSI.grey + 'Dishes: ' + dishes.map(function(d) { return d.id; }).join(', ') + ANSI.reset);
        XTERM.writeln('');
      }
      return;
    }
    TerminalState.mode = 'onboarding';
    startOnboarding();
  }).catch(function(err) {
    termAppend('error', 'Could not reach /api/dishes: ' + err.message);
    termEnterCommandMode();
  });
}

// ── Initialize ──────────────────────────────────────────────────────────

handleRoute();
connectSSE();
</script>
</body>
