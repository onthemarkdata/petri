# Petri Dish Configuration
# Single config file — all settings in one place.

name: petri

# ── Model & Harness ─────────────────────────────────────────────────────
# WARNING: The multi-agent pipeline generates significant token usage.
# A single colony with 10+ nodes can produce thousands of LLM calls.

model:
  name: claude-sonnet-4-6
  # All inference routes through Claude Code CLI → Anthropic API.

harness: claude-code

# ── Pipeline ────────────────────────────────────────────────────────────

max_iterations: 3
max_concurrent: 4
max_decomposition_depth: 3  # Five Whys: how many levels deep to decompose

# ── Source Hierarchy ────────────────────────────────────────────────────
# 6-level evidence credibility ranking (strongest to weakest)
# Terminal decisions (VALIDATED/DISPROVEN) require at least one Level 1-4 source

source_hierarchy:
  minimum_terminal_level: 4
  levels:
    1:
      name: Direct Measurement
      description: "Ran the experiment, recorded the data"
      terminal_eligible: true
    2:
      name: Authoritative Documentation
      description: "Official docs, published specs, pricing pages"
      terminal_eligible: true
    3:
      name: Derived Calculation
      description: "Math from known inputs — show the formula"
      terminal_eligible: true
    4:
      name: Corroborated Expert Consensus
      description: "Multiple independent experts agree"
      terminal_eligible: true
    5:
      name: Single Expert Opinion
      description: "One credible source, noted as such"
      terminal_eligible: false
    6:
      name: Community Report
      description: "Reddit, forums, Discord — useful signal, not proof"
      terminal_eligible: false

# ── Debates ─────────────────────────────────────────────────────────────
# 4 structured debates mediated by Node Lead during critique phase

debates:
  - pair: [skeptic, champion]
    rounds: 1.5  # Skeptic gets final word
    purpose: "Adversarial challenge — skeptic builds case against, champion defends"

  - pair: [skeptic, pragmatist]
    rounds: 1
    purpose: "Practical relevance — does the skeptic's concern matter in practice?"

  - pair: [simplifier, impact_assessor]
    rounds: 1
    purpose: "Scope safety — is simplification safe given the node's impact?"

  - pair: [triage, impact_assessor]
    rounds: 1
    purpose: "Effort alignment — is the effort justified by the node's criticality?"

# ── Agents ──────────────────────────────────────────────────────────────
# 3 lead agents (non-blocking orchestrators) + 10 specialist agents

agents:

  # === Lead Agents (non-blocking, orchestrate phases) ===

  decomposition_lead:
    display_name: Decomposition Lead
    is_lead: true
    scope: decomposition
    phase: null
    blocking: false
    verdicts_pass: [DECOMPOSITION_COMPLETE, DECOMPOSITION_NEEDS_REFINEMENT]
    verdicts_block: []
    redirect_on_block: null

  node_lead:
    display_name: Node Lead
    is_lead: true
    scope: pipeline
    phase: null
    blocking: false
    verdicts_pass: [PIPELINE_COMPLETE, PIPELINE_STALLED]
    verdicts_block: []
    redirect_on_block: null

  red_team_lead:
    display_name: Red Team Lead
    is_lead: true
    scope: red_team
    phase: null
    blocking: false
    verdicts_pass: [STRONG_DISPROVAL_CASE, WEAK_DISPROVAL_CASE, NO_CONTRADICTING_EVIDENCE]
    verdicts_block: []
    redirect_on_block: null
    instruction: >
      Lead adversarial disproval. Number each counter-argument with a
      contradicting source and URL. Each source must have
      supports_or_contradicts='contradicts'. Summary: strongest single
      disproval argument in 1-2 sentences.

  # === Phase 1 Agents (Research) ===

  investigator:
    display_name: Investigator
    is_lead: false
    scope: null
    phase: 1
    blocking: true
    verdicts_pass: [EVIDENCE_SUFFICIENT, EVIDENCE_CONTRADICTS]
    verdicts_block: [NEEDS_MORE_EVIDENCE, CANNOT_DETERMINE]
    redirect_on_block: null
    instruction: >
      Seek primary sources for this claim. Minimum 3 sources, each with a
      valid URL, hierarchy level, and 1-2 sentence finding. Trace evidence
      to its origin — do not accept surface-level support.
      Summary: 1-3 sentences stating evidence sufficiency with specific
      source counts and dimensions covered.

  freshness_checker:
    display_name: Freshness Checker
    is_lead: false
    scope: null
    phase: 1
    blocking: true
    verdicts_pass: [EVIDENCE_CURRENT, STALE_BUT_HOLDS]
    verdicts_block: [MATERIALLY_STALE]
    redirect_on_block: null
    instruction: >
      For each source in prior evidence, verify currency. Cite the source
      URL, note its publication date, and assess staleness risk
      (NONE/LOW/MEDIUM/HIGH). Summary: 1 sentence on overall evidence
      currency with count of stale sources.

  dependency_auditor:
    display_name: Dependency Auditor
    is_lead: false
    scope: null
    phase: 1
    blocking: true
    verdicts_pass: [DEPENDENCIES_CLEAN]
    verdicts_block: [UNVALIDATED_DEPS, CIRCULAR_REASONING]
    redirect_on_block: null
    instruction: >
      Audit the logical chain. For each dependency, cite the source that
      validates it. Flag any circular reasoning, unvalidated assumptions,
      or hidden premises with a URL to the gap.
      Summary: 1-2 sentences on chain integrity.

  # === Phase 2 Agents (Critique) ===

  skeptic:
    display_name: Skeptic
    is_lead: false
    scope: null
    phase: 2
    blocking: true
    verdicts_pass: [ARGUMENT_WITHSTANDS_CRITIQUE]
    verdicts_block: [CRITICAL_FLAW_FOUND, UNADDRESSED_COUNTERARGUMENT]
    redirect_on_block: null
    instruction: >
      Build the strongest case AGAINST. Number each adversarial argument
      (1-2 sentences each). For each, cite a contradicting source with URL.
      Include falsification conditions — what would prove this claim false.
      Summary: single strongest reason to doubt this claim.

  champion:
    display_name: Champion
    is_lead: false
    scope: null
    phase: 2
    blocking: true
    verdicts_pass: [STRONG_CASE, DEFENSIBLE_WITH_CAVEATS]
    verdicts_block: [CANNOT_DEFEND]
    redirect_on_block: null
    instruction: >
      Build the strongest case FOR. Cite supporting sources ranked by
      hierarchy level (strongest first). Include rebuttals to likely
      skeptic objections, each backed by a source with URL.
      Summary: single strongest reason to believe, with source count.

  pragmatist:
    display_name: Pragmatist
    is_lead: false
    scope: null
    phase: 2
    blocking: true
    verdicts_pass: [PRODUCTION_READY, DIRECTIONALLY_CORRECT]
    verdicts_block: [WOULD_NOT_SHIP_THIS]
    redirect_on_block: null
    instruction: >
      Evaluate practical significance. Cite real-world implementations,
      case studies, or failures with URLs. Assess whether this matters
      if true or false. Summary: 1-2 sentences on practical relevance.

  simplifier:
    display_name: Simplifier
    is_lead: false
    scope: null
    phase: 2
    blocking: false
    verdicts_pass: [APPROPRIATELY_SCOPED, COULD_BE_SIMPLER]
    verdicts_block: [OVERCOMPLICATED]
    redirect_on_block: null
    instruction: >
      Check scope. Cite sources that support or challenge the scoping.
      Summary: 1 sentence on whether scope is appropriate.

  triage:
    display_name: Triage
    is_lead: false
    scope: null
    phase: 2
    blocking: conditional
    verdicts_pass: [HIGH_VALUE, MODERATE_VALUE]
    verdicts_block: [LOW_VALUE_DEFER]
    redirect_on_block: DEFER_OPEN
    instruction: >
      Assess validation priority. Cite what decision this informs and
      what changes if validated vs invalidated.
      Summary: 1 sentence on priority with justification.

  impact_assessor:
    display_name: Impact Assessor
    is_lead: false
    scope: null
    phase: 2
    blocking: false
    verdicts_pass: [CRITICAL_PATH, SUPPORTING_NOT_BLOCKING, ISOLATED_LOW_IMPACT]
    verdicts_block: []
    redirect_on_block: null
    instruction: >
      Map downstream dependencies. Cite what breaks if this claim is wrong.
      Classify as FOUNDATION_STONE, KEYSTONE, CAPSTONE, or ISOLATED.
      Estimate blast radius (HIGH >5, MEDIUM 2-5, LOW 0-1).
      Summary: 1 sentence on what breaks if wrong.

  # === Post-Convergence ===

  evidence_evaluator:
    display_name: Evidence Evaluator
    is_lead: false
    scope: null
    phase: null
    blocking: false
    verdicts_pass: [EVIDENCE_CONFIRMS, EVIDENCE_REFUTES, EVIDENCE_INCONCLUSIVE]
    verdicts_block: []
    redirect_on_block: null
    instruction: >
      Final determination. Produce a source inventory: count sources by
      hierarchy level, supporting vs contradicting. Weigh all evidence
      from investigation, critique, and red team phases.
      Summary: 1-3 sentences with verdict reasoning and confidence.
