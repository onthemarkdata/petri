name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: the v2 migration backlog already covers a lot of ground — check the
        [migration plan](https://github.com/onthemarkdata/petri/blob/main/docs/v2/MIGRATION_PLAN.md)
        and open issues first. If your idea fits an existing issue, comment there instead.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation where Petri falls short — the problem, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
